name: CI

on:
  pull_request:
  push:
    branches: [master]

# A pushed branch + the PR it opens would otherwise run twice. Cancel
# the older run on every new push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  # wine env: applied workflow-wide so wineboot priming AND the
  # per-test wine invocations both see them. WINEDEBUG silences the
  # debug spam that otherwise floods CI logs. WINEDLLOVERRIDES
  # disables the three services (winemenubuilder, mscoree, mshtml)
  # that hang waiting for an X server / network on headless CI.
  # Non-wine runners ignore these.
  WINEDEBUG: "-all"
  WINEDLLOVERRIDES: "winemenubuilder.exe=d;mscoree=d;mshtml=d"
  # The demo smokes' `setup.py` files download archives from the
  # `vendor-deps-v1` release on this repo. While the repo is
  # private, anonymous GitHub release downloads return 404 -- the
  # auto-provisioned token authenticates the api.github.com path
  # in `scripts/vendor_deps/_fetch.py`. Once the repo is public
  # this can be dropped (the no-token path will work).
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
      # The default features are the host-JIT library only, so the line
      # above does not build the `badc` binary or the CLI integration
      # tests (both gated on `full`). Run clippy again with `--features
      # full` so `main.rs` and the full-only targets are linted too.
      - name: cargo clippy (full)
        run: cargo clippy --all-targets --features full -- -D warnings
      # Sources and docs are ASCII-only. Smart quotes / em dashes /
      # arrows tend to sneak in via copy-paste and rendered editor
      # autocorrect; keep them out at the gate. A fixture that exercises
      # the lexer / preprocessor UTF-8 decode paths must carry the raw
      # multibyte bytes in source (an escape sequence would bypass the
      # code under test), so it is excluded here, matching the allowlist
      # in scripts/git-hooks/pre-push.
      - name: ASCII-only sources
        run: |
          if grep -rPn '[^\x00-\x7F]' \
              --include='*.md' --include='*.rs' --include='*.c' \
              --include='*.toml' --include='*.yml' \
              --exclude='wide_char_utf8.c' \
              --exclude-dir=target --exclude-dir=.git . ; then
            echo
            echo "::error::Non-ASCII characters found above."
            echo "Common replacements: -> for U+2192, -- for em dash (U+2014), ... for ellipsis (U+2026)."
            exit 1
          fi

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
          - windows-latest
          - windows-11-arm
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        # Pin Python so `python` resolves consistently on every
        # runner (Linux + macOS use `python3` by default; Windows
        # ships `python` but no `python3` on PATH). The smoke
        # script invokes `python demos/sqlite3/smoke.py` and
        # expects the modern stdlib (urllib, zipfile, pathlib).
        with:
          python-version: '3.x'
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}
      - name: install wine (linux only)
        # `ubuntu-24.04-arm` -> native_pe_arm64 tests via wine 10's
        # aarch64-windows DLL set.
        # `ubuntu-latest`    -> native_pe_x64 tests via wine's
        # x86_64-windows DLL set, as a cross-check against the
        # `windows-latest` runner: both should accept the same PE,
        # so a divergence flags either a wine bug or a real format
        # issue. Skip on every other runner -- the tests cfg-gate
        # to their respective triples.
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-24.04-arm'
        run: |
          sudo apt-get update -y
        # sudo apt-get install -y wine
        #
        # - name: prime wine prefix (linux only)
        # First-time `wine` invocation creates `~/.wine`, which on a
        # fresh CI runner takes ~60s and would race the parallel test
        # processes (cargo test runs tests on threads, each shelling
        # out to wine; without a primed prefix they all try to
        # initialize it concurrently and time out). Run wineboot
        # once up front so every test sees a ready prefix.
        #
        # On headless CI, wineboot's default services (winemenubuilder,
        # mscoree, mshtml) try to talk to an X server / network and
        # stall indefinitely, so we disable them via
        # WINEDLLOVERRIDES. The `timeout` guard caps the step at 90s
        # so a hanging wineboot can't block the whole job. After
        # priming, `wineserver -k` shuts down the background server
        # so the per-test `wine` invocations spawn a fresh, healthy
        # one rather than reusing whatever state is left in memory.
        #
        # if: matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-24.04-arm'
        # run: |
        #  timeout 90 wineboot --init || true
        #  wineserver -k || true
        # env:
        #  # No display server on the CI runner; force wine to skip
        #  # any X11 init paths that might still be reachable past
        #  # WINEDLLOVERRIDES.
        #  DISPLAY: ""
      - name: cargo test (full features)
        # `BADC_RUN_WINE` maybe be used in the macOS / Linux -> wine -> PE
        # test lane; without it the PE-via-WINE tests skip (so a
        # routine `cargo test` on a developer machine doesn't shell
        # out to wine). We set it on the two ubuntu runners that
        # also installed wine in the steps above.
        #
        # env:
        #  BADC_RUN_WINE: ${{ (matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-24.04-arm') && '1' || '' }}
        #
        # Each runner exercises the native-codegen path that targets
        # its own host:
        #  * macos-latest        -> src/c4/tests/native.rs (Mach-O,
        #    `/usr/bin/codesign`) + src/c4/tests/jit.rs (in-process
        #    JIT via MAP_JIT + pthread_jit_write_protect_np). The
        #    PE-via-WINE tests in src/c4/tests/native_pe_x64.rs
        #    compile here too but skip at runtime when WINE isn't
        #    installed (it isn't on the macos-latest image).
        #  * ubuntu-24.04-arm    -> src/c4/tests/native_elf.rs
        #    (Linux/aarch64 ELF, host kernel exec) +
        #    src/c4/tests/jit.rs (mprotect-based JIT) +
        #    src/c4/tests/native_pe_arm64.rs through wine 10's
        #    aarch64-windows DLL set (installed in the step above).
        #  * ubuntu-latest       -> src/c4/tests/native_elf_x64.rs
        #    (Linux/x86_64 ELF, host kernel exec) +
        #    src/c4/tests/jit.rs (mprotect-based JIT) +
        #    src/c4/tests/native_pe_x64.rs through wine's
        #    x86_64-windows DLL set (installed in the step above)
        #    as a cross-check against the windows-latest runner.
        #  * windows-latest      -> src/c4/tests/native_pe_x64.rs
        #    (Windows/x86_64 PE, host kernel exec). Runs the
        #    produced .exe directly; no JIT lane on Windows because
        #    the in-process JIT loader hasn't been ported.
        #  * windows-11-arm      -> src/c4/tests/native_pe_arm64.rs
        #    (Windows/AArch64 PE, host kernel exec). Same shape as
        #    the windows-latest lane but for the AArch64 backend.
        # The backend test modules are cfg-gated to their
        # respective triples, so the other runners compile them out
        # and only verify the VM, lexer, parser, codegen-as-bytecode,
        # and optimizer paths.
        run: cargo test --locked --features full --verbose
      - name: compare fib vs libc_basic ELFs (ubuntu-latest only, on failure)
        # Real-Intel-only crash inside libc-heavy fixtures; QEMU and
        # macOS/aarch64 lanes pass identical bytes. The perf-table
        # job's fib.c binary works on the same hardware. Build both
        # via the CLI path and diff their ELF headers / segment
        # layouts / dynamic section to find what shape only the
        # failing one has.
        if: ${{ failure() && matrix.os == 'ubuntu-latest' }}
        run: |
          sudo apt-get install -y -qq strace || true
          cargo build --release --locked --features full --bin badc
          set +e
          BADC=./target/release/badc
          echo '#include <stdio.h>'                                  > /tmp/pf.c
          echo 'int main(void){printf("ok\n");return 0;}'           >> /tmp/pf.c
          $BADC tests/fixtures/c/libc_basic.c -o /tmp/libc_basic
          $BADC tests/perf/fib.c -o /tmp/fib
          $BADC /tmp/pf.c -o /tmp/pf
          echo
          echo '=== /tmp/pf (hello) run ==='
          /tmp/pf; echo exit=$?
          echo '=== /tmp/fib run ==='
          timeout 5 /tmp/fib 2>&1 | head -3; echo exit=$?
          echo '=== /tmp/libc_basic run ==='
          /tmp/libc_basic; echo exit=$?
          for b in /tmp/pf /tmp/fib /tmp/libc_basic; do
            echo "=== readelf -h $b ==="
            readelf -h "$b" | head -20
            echo "=== readelf -l $b ==="
            readelf -l "$b" | head -30
            echo "=== readelf -d $b ==="
            readelf -d "$b" | head -20
          done
          echo '=== strace -i /tmp/libc_basic (post-load) ==='
          strace -i /tmp/libc_basic 2>&1 | tail -30
          true
      - name: cargo build --no-default-features --lib
        # The no_std variant -- no StdHost adapter, alloc only. Library-
        # only because the binary needs std for argv / stdio.
        run: cargo build --locked --no-default-features --lib --verbose
      - name: sqlite3 smoke
        # Fetch upstream sqlite, compile `sqlite3.c + shell.c`
        # with the freshly-built badc, and round-trip the
        # in-memory and file-backed scenarios at both -O and noO.
        # Same script across all five runners thanks to the
        # `actions/setup-python` step above.
        run: |
          cargo build --release --locked --features full
          python demos/sqlite3/smoke.py
      - name: capture sqlite3 shell crash under gdb (Linux x86_64 only)
        # Build the shell the way smoke.py does (amalgamated +
        # `-include msvc_compat.h`) but with `-g`, then re-run
        # the first failing scenario inside gdb to dump a
        # backtrace + registers + disassembly. `continue-on-
        # error` keeps the diagnostic from masking other
        # failures in the matrix.
        if: matrix.os == 'ubuntu-latest' && failure()
        continue-on-error: true
        run: |
          set +e
          sudo apt-get update -qq
          sudo apt-get install -y -qq gdb
          BADC="$PWD/target/release/badc"
          WORK="$RUNNER_TEMP/sqlite3-gdb"
          rm -rf "$WORK"; mkdir -p "$WORK"
          cd "$WORK"
          echo "=== running smoke.py with BADC_SMOKE_KEEP_TMPDIR ==="
          # smoke.py's atexit hook copies its tempdir contents into
          # $WORK/saved regardless of pass / fail.
          BADC="$BADC" BADC_SMOKE_KEEP_TMPDIR="$WORK/saved" \
            python3 "$GITHUB_WORKSPACE/demos/sqlite3/smoke.py" || true
          # Pick the noopt binary if it exists.
          cp "$WORK"/saved/sqlite3shell "$WORK"/shell_g 2>/dev/null \
            || cp "$WORK"/saved/sqlite3shell.opt "$WORK"/shell_g 2>/dev/null \
            || echo "no shell saved"
          ls -la "$WORK"/shell_g 2>&1 | head -1
          # First failing scenario from smoke.py:
          cat > in.sql <<'EOF'
          CREATE TABLE t(x INTEGER, y TEXT);
          INSERT INTO t VALUES(-7,'neg'),(1,'hello'),(2,'world');
          SELECT * FROM t;
          .quit
          EOF
          echo "=== gdb backtrace ==="
          gdb -batch \
            -ex "set pagination off" \
            -ex "run < in.sql" \
            -ex "bt 50" \
            -ex "info reg" \
            -ex "x/8i \$rip-16" \
            -ex "frame 0" \
            -ex "disas" \
            ./shell_g 2>&1 | head -200
          echo "=== gdb exit ==="
      - name: capture sqlite3 shell crash under cdb (Windows only)
        # Mirror of the Linux gdb capture for the Windows runners.
        # Rebuilds the optimized shell via smoke.py with the
        # tempdir preserved, then runs it under cdb to dump the
        # crash module + offending instruction + stack on the
        # first access violation. `continue-on-error` keeps the
        # diagnostic from masking other matrix failures.
        if: runner.os == 'Windows' && failure()
        shell: cmd
        continue-on-error: true
        run: |
          @echo off
          setlocal
          set "CDB=C:\Program Files (x86)\Windows Kits\10\Debuggers\x64\cdb.exe"
          if not exist "%CDB%" (
            echo cdb.exe not found at "%CDB%"
            exit /b 0
          )
          set "BADC=%CD%\target\release\badc.exe"
          set "WORK=%RUNNER_TEMP%\sqlite3-cdb"
          if exist "%WORK%" rmdir /s /q "%WORK%"
          mkdir "%WORK%"
          echo === running smoke.py with BADC_SMOKE_KEEP_TMPDIR ===
          set "BADC_SMOKE_KEEP_TMPDIR=%WORK%\saved"
          python "%GITHUB_WORKSPACE%\demos\sqlite3\smoke.py"
          set "SHELL_OPT="
          for /f "delims=" %%F in ('dir /b /s "%WORK%\saved\sqlite3shell.opt.exe" 2^>nul') do (
            if not defined SHELL_OPT set "SHELL_OPT=%%F"
          )
          if not defined SHELL_OPT (
            echo no sqlite3shell.opt.exe found under "%WORK%\saved"
            dir /s "%WORK%" 2>&1
            exit /b 0
          )
          echo === running %SHELL_OPT% under cdb ===
          rem Drive sqlite3shell via its `-cmd` flag instead of stdin
          rem so cdb's console does not consume the SQL. `g` resumes
          rem from the initial breakpoint and the access violation
          rem stops the debugger; `.ecxr` pins the registers to the
          rem exception context, `.lastevent` / `r` / `kn 50` / `lm`
          rem / `u . L40` dump the crash; `qd` detaches and exits.
          "%CDB%" -c "g; .ecxr; .lastevent; r; kn 50; lm; u . L40; qd" "%SHELL_OPT%" -cmd "SELECT 1;" -cmd ".quit" 2>&1
          echo === cdb exit code: %ERRORLEVEL% ===
      - name: miniz smoke (amalg + TU + archive)
        # Same shape as the sqlite step but smaller: ~9k LOC of
        # integer + bit-twiddle deflate code. Compresses + uncompresses
        # a known buffer at both -O and noO and checks CRC32 / Adler32
        # against RFC 1950 / 3309 reference values. Runs three build
        # flavours (single-source amalgamation, separate-compilation
        # `-c` + link, and `--ar` archive + `-l`) at both -O levels
        # to exercise the linker pipeline end-to-end.
        run: python demos/miniz/smoke.py
      - name: kissfft smoke (amalg + TU + archive)
        # First real FP exerciser. Builds KISS FFT + a real-only
        # add-on through badc and runs an impulse FFT, a forward
        # +inverse round-trip, and a single-frequency sine real
        # FFT at both -O and noO. Catches FP libm boundary
        # regressions (xmm0 / d0 return value, FP arg masks
        # through the optimizer, ...). Runs the same three build
        # flavours as miniz so the multi-TU FP paths get exercised.
        run: python demos/kissfft/smoke.py
      - name: bzip2 smoke (amalg + TU + archive)
        # Third non-trivial demo. Integer + bit-twiddle heavy:
        # BWT, move-to-front, run-length encoding, and Huffman
        # coding through a 128-bit bitstream packer. Compresses +
        # decompresses a 600-byte buffer at blockSize 1 and 9 at
        # both -O and noO. Different code shape from miniz's
        # deflate. Runs the same three build flavours so the
        # bzip2 library bundles correctly through `--ar`.
        run: python demos/bzip2/smoke.py
      - name: tweetnacl smoke (amalg + TU + archive)
        # TweetNaCl is the auditable NaCl implementation
        # (Salsa20, Poly1305, X25519, Ed25519, SHA-512) in
        # ~700 lines of portable C99. The five-scenario driver
        # asserts a SHA-512 known-answer, an RFC 8032 Ed25519
        # vector (deterministic signature byte-for-byte), and
        # secretbox / box / sign round trips. Runs the same
        # three build flavours so the multi-TU + archive paths
        # get exercised across `-O` and no-`-O`.
        run: python demos/tweetnacl/smoke.py
      - name: monocypher smoke (amalg + TU + archive)
        # MonoCypher is a modern auditable crypto library:
        # Chacha20-Poly1305 AEAD, BLAKE2b, X25519, optional
        # SHA-512 + RFC 8032 Ed25519. Five scenarios:
        # SHA-512(`abc`), BLAKE2b(`abc`), RFC 8032 Ed25519
        # vector 1 (sign + verify), AEAD round trip, X25519
        # Diffie-Hellman. Same build flavour matrix as the
        # other library demos.
        run: python demos/monocypher/smoke.py

      - name: capture monocypher -O crash under cdb (Windows only)
        # Builds the optimized monocypher smoke binary directly and runs
        # it under cdb to dump the faulting instruction, register /
        # exception context, and stack on the first access violation.
        # `.ecxr` pins the registers to the exception context; `kn` gives
        # the faulting function and stack pointer so a guard-page fault
        # versus a data fault is distinguishable.
        if: runner.os == 'Windows' && failure()
        shell: cmd
        continue-on-error: true
        run: |
          @echo off
          setlocal enabledelayedexpansion
          set "CDB="
          for %%A in (arm64 x64) do (
            if not defined CDB if exist "C:\Program Files (x86)\Windows Kits\10\Debuggers\%%A\cdb.exe" (
              set "CDB=C:\Program Files (x86)\Windows Kits\10\Debuggers\%%A\cdb.exe"
            )
          )
          if not defined CDB ( echo cdb.exe not found & exit /b 0 )
          set "BADC=%CD%\target\release\badc.exe"
          set "M=%GITHUB_WORKSPACE%\demos\monocypher"
          python "%GITHUB_WORKSPACE%\scripts\amalgamate.py" -o "%RUNNER_TEMP%\mono.c" "%M%\monocypher.c" "%M%\monocypher-ed25519.c" "%M%\smoke_main.c"
          "%BADC%" -O -g -I "%M%" "%RUNNER_TEMP%\mono.c" -o "%RUNNER_TEMP%\mono_O.exe"
          echo === running mono_O.exe under cdb ===
          "%CDB%" -c "g; .ecxr; .lastevent; r; kn 40; lm; u . L20; qd" "%RUNNER_TEMP%\mono_O.exe" 2>&1
          echo === cdb exit code: %ERRORLEVEL% ===

      - name: bearssl smoke (TU + archive + upstream KATs)
        # Builds every .c file under demos/bearssl/src into a
        # static archive, links it against the bundled
        # smoke_main.c (FIPS 180-2 SHA-256/224, RFC 4231
        # HMAC-SHA-256, RFC 5869 HKDF-SHA-256) and against
        # upstream test/test_crypto.c run with a whitelisted
        # set of fast KAT suites covering hashes, MACs, KDFs,
        # DRBGs, the TLS PRF, ChaCha20 and Poly1305. Slow
        # AES / DES KAT loops are tracked under TODO.
        run: python demos/bearssl/smoke.py
      - name: curl smoke (static + shared + system + BearSSL HTTPS)
        # Compiles the whole libcurl source tree (HTTP + file + ws)
        # and builds it as a static archive, a shared library, and an
        # exe linked against each, plus a flavour bound to the system
        # libcurl. HTTPS uses badc-compiled BearSSL. Transfers run
        # against a hermetic loopback server. The Windows build is
        # skipped for now (config-win32 surface pending), so the step
        # is a no-op there.
        run: python demos/curl/smoke.py
      - name: raylib standalone build + cdb load gate (Windows)
        # Build the vendored raylib + Lode Runner game standalone, then run
        # it under cdb with show-loader-snaps. A win32 / CRT import bound to
        # a DLL that does not export the symbol fails the loader at process
        # start (STATUS_ENTRYPOINT_NOT_FOUND, 0xc0000139), which a build-only
        # check misses. The initial process breakpoint stops before the
        # entry point, so the windowed game never runs -- only the loader's
        # import walk is exercised. smoke.py also resolves every PE import
        # via GetProcAddress; this is the authoritative real-loader gate.
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          @echo off
          setlocal
          set "OUT=%RUNNER_TEMP%\raylib-out"
          if exist "%OUT%" rmdir /s /q "%OUT%"
          python "%GITHUB_WORKSPACE%\demos\raylib\smoke.py" --out-dir "%OUT%" || exit /b 1
          set "EXE=%OUT%\loderunner.exe"
          if not exist "%EXE%" ( echo loderunner.exe not built & exit /b 1 )
          set "CDBDIR=x64"
          if /I "%PROCESSOR_ARCHITECTURE%"=="ARM64" set "CDBDIR=arm64"
          set "CDB=C:\Program Files (x86)\Windows Kits\10\Debuggers\%CDBDIR%\cdb.exe"
          if not exist "%CDB%" ( echo cdb not found at "%CDB%" & exit /b 1 )
          set "LOG=%OUT%\cdb.log"
          echo === cdb loader snaps on loderunner.exe ===
          echo q | "%CDB%" -logo "%LOG%" -xe ld:ntdll -c "!gflag +sls; g" "%EXE%"
          if exist "%LOG%" type "%LOG%"
          rem findstr exits 1 when the pattern is absent (the success case),
          rem so branch on errorlevel and exit 0 explicitly.
          findstr /c:"c0000139" "%LOG%" >nul
          if not errorlevel 1 (
            echo FAIL: unresolved import under the loader ^(0xc0000139^)
            exit /b 1
          )
          echo === cdb load gate OK: all imports resolved ===
          exit /b 0
      - name: quickjs smoke (qjs CLI + pure-JS test suite)
        # Vendored bellard/quickjs compiles + 8-TU links through badc;
        # the qjs CLI runs QuickJS's own pure-JS test suite (closure,
        # language, loop, bigint, cyclic_import, std, worker, rw_handler,
        # builtin --std). The two native-module tests need a runtime
        # dlopen of a badc-built .so (TODO). Windows is skipped at the
        # smoke level (quickjs-libc targets a POSIX host).
        if: runner.os != 'Windows'
        shell: bash
        run: python demos/quickjs/smoke.py
      - name: lua smoke (multi-TU + upstream test suite)
        # Vendored Lua 5.5.0 sources compile + multi-TU link
        # through badc, and the curated 24-script `lua-tests`
        # subset (bitwise, closures, coroutines, math, pattern,
        # sort, string, table, utf8, vararg, plus the `T`-driven
        # api / gc / gengc / memerr / tracegc) runs against the
        # produced interpreter at both -O and noO. Strict-gated
        # on macOS / Linux x86_64 / Linux aarch64. The Windows
        # lanes are skipped at the workflow level because the
        # smoke surfaces msvcrt runtime gaps (math.lua ldexp /
        # frexp, cstack.lua recursion limit, strings.lua and
        # constructs.lua formatting on AArch64) tracked under
        # TODO; the c5 build + setjmp / longjmp paths are still
        # covered by the `native_pe_*` cargo fixture parity.
        if: runner.os != 'Windows'
        shell: bash
        run: python demos/lua/smoke.py
      - name: probe Windows msvcrt setjmp + capture lua crash
        # Diagnostic for the Windows runtime gaps the lua smoke
        # surfaces. Runs only when the smoke fails. Two probes:
        #   1. dump msvcrt.dll exports filtered to setjmp /
        #      longjmp so the binding choice in <setjmp.h>
        #      stops being a guess on this lane.
        #   2. rebuild a fresh lua.exe (the smoke wipes its
        #      tempdir) and run a quick assertion-failing
        #      script under cdb so the crash PC + module +
        #      unwind reach the log.
        if: failure() && runner.os == 'Windows'
        shell: cmd
        continue-on-error: true
        run: |
          @echo off
          setlocal
          echo === msvcrt setjmp / longjmp exports ===
          set "DUMPBIN="
          for /f "delims=" %%P in ('dir /b /s "C:\Program Files\Microsoft Visual Studio\*\*\VC\Tools\MSVC\*\bin\Host*\*\dumpbin.exe" 2^>nul') do (
            if not defined DUMPBIN set "DUMPBIN=%%P"
          )
          if not defined DUMPBIN ( echo dumpbin not on PATH; skipping & goto :build )
          "%DUMPBIN%" /exports C:\Windows\System32\msvcrt.dll | findstr /i "setjmp longjmp _set"
          :build
          echo.
          echo === building diagnostic lua.exe ===
          set "BADC=%CD%\target\release\badc.exe"
          set "WORK=%RUNNER_TEMP%\lua-diag"
          if exist "%WORK%" rmdir /s /q "%WORK%"
          mkdir "%WORK%"
          set "SRC=%CD%\demos\lua\src"
          set "LT=%CD%\demos\lua\tests\ltests"
          "%BADC%" -q -DLUA_USER_H=\"ltests.h\" -I "%SRC%" -I "%LT%" -o "%WORK%\lua.exe" ^
            "%SRC%\lapi.c" "%SRC%\lauxlib.c" "%SRC%\lbaselib.c" "%SRC%\lcode.c" ^
            "%SRC%\lcorolib.c" "%SRC%\lctype.c" "%SRC%\ldblib.c" "%SRC%\ldebug.c" ^
            "%SRC%\ldo.c" "%SRC%\ldump.c" "%SRC%\lfunc.c" "%SRC%\lgc.c" "%SRC%\linit.c" ^
            "%SRC%\liolib.c" "%SRC%\llex.c" "%SRC%\lmathlib.c" "%SRC%\lmem.c" ^
            "%SRC%\loadlib.c" "%SRC%\lobject.c" "%SRC%\lopcodes.c" "%SRC%\loslib.c" ^
            "%SRC%\lparser.c" "%SRC%\lstate.c" "%SRC%\lstring.c" "%SRC%\lstrlib.c" ^
            "%SRC%\ltable.c" "%SRC%\ltablib.c" "%SRC%\ltm.c" "%SRC%\lua.c" ^
            "%SRC%\lundump.c" "%SRC%\lutf8lib.c" "%SRC%\lvm.c" "%SRC%\lzio.c" ^
            "%LT%\ltests.c"
          if errorlevel 1 ( echo lua build failed & exit /b 0 )
          echo.
          echo === sanity: lua -v ===
          "%WORK%\lua.exe" -v
          echo lua-v exit: %ERRORLEVEL%
          echo.
          echo === assertion script under cdb ===
          set "CDBDIR=x64"
          if /I "%PROCESSOR_ARCHITECTURE%"=="ARM64" set "CDBDIR=arm64"
          set "CDB=C:\Program Files (x86)\Windows Kits\10\Debuggers\%CDBDIR%\cdb.exe"
          if not exist "%CDB%" ( echo cdb not found at "%CDB%"; skipping crash capture & exit /b 0 )
          echo print 'before assert' > "%WORK%\probe.lua"
          echo assert(false, 'probe-assertion') >> "%WORK%\probe.lua"
          echo print 'unreachable' >> "%WORK%\probe.lua"
          set "LOG=%RUNNER_TEMP%\lua-cdb.log"
          if exist "%LOG%" del "%LOG%"
          "%CDB%" -logo "%LOG%" -c "g; .lastevent; r; kn 30; lm; qq" -G -g "%WORK%\lua.exe" "%WORK%\probe.lua"
          echo cdb exit: %ERRORLEVEL%
          if exist "%LOG%" ( echo === cdb log === & type "%LOG%" ) else ( echo no cdb log produced )
      - name: probe Windows libc number formatting + frexp/ldexp
        # Reproduces the msvcrt / ucrtbase entry points the
        # windows-lane lua tests fail against:
        # `snprintf("%.14g", 1203.125)` (strings.lua), the
        # `ldexp(frexp(x))` round-trip on math.lua's eight
        # constants, and the adjacent-ULP `tostring(x) !=
        # tostring(x + 2^(i - 52))` chain from math.lua's
        # 1100-1110 block. The output decides whether the
        # remaining bug is in c5's binding choice, the printf /
        # strtod two-step that `tostringbuffFloat` relies on,
        # or the test idiom itself.
        if: runner.os == 'Windows'
        shell: cmd
        continue-on-error: true
        run: |
          @echo off
          setlocal
          set "BADC=%CD%\target\release\badc.exe"
          set "WORK=%RUNNER_TEMP%\probe"
          if exist "%WORK%" rmdir /s /q "%WORK%"
          mkdir "%WORK%"
          > "%WORK%\probe.c" echo #include ^<stdio.h^>
          >>"%WORK%\probe.c" echo #include ^<math.h^>
          >>"%WORK%\probe.c" echo #include ^<stdlib.h^>
          >>"%WORK%\probe.c" echo #include ^<string.h^>
          >>"%WORK%\probe.c" echo int main(void) {
          >>"%WORK%\probe.c" echo   char b[64];
          >>"%WORK%\probe.c" echo   double vs[8] = {0.0, 10.0, 32.0, -3.14159265358979, 1e10, 1e-10, 0.0, 0.0};
          >>"%WORK%\probe.c" echo   double inf_pos = 1.0; inf_pos = inf_pos / 0.0; vs[6] =  inf_pos;
          >>"%WORK%\probe.c" echo   double neg     = 1.0; neg     = -neg / 0.0; vs[7] = neg;
          >>"%WORK%\probe.c" echo   snprintf(b, 64, "%%.14g", 1203.125);    printf("FMT1203: [%%s]\n", b);
          >>"%WORK%\probe.c" echo   snprintf(b, 64, "%%.14g", -0.5);        printf("FMTneg5: [%%s]\n", b);
          >>"%WORK%\probe.c" echo   snprintf(b, 64, "%%.14g", -32767.0);    printf("FMTk32:  [%%s]\n", b);
          >>"%WORK%\probe.c" echo   snprintf(b, 64, "%%g",    1203.125);    printf("FMTg:    [%%s]\n", b);
          >>"%WORK%\probe.c" echo   for (int i = 0; i ^< 8; i++) {
          >>"%WORK%\probe.c" echo     double x = vs[i];
          >>"%WORK%\probe.c" echo     int e;
          >>"%WORK%\probe.c" echo     double m = frexp(x, ^&e);
          >>"%WORK%\probe.c" echo     double r = ldexp(m, e);
          >>"%WORK%\probe.c" echo     printf("RT[%%d] x=%%.17g m=%%.17g e=%%d r=%%.17g eq=%%d\n", i, x, m, e, r, r == x);
          >>"%WORK%\probe.c" echo   }
          >>"%WORK%\probe.c" echo   int first_x_eq_y = 0, first_str_eq = 0;
          >>"%WORK%\probe.c" echo   int x_eq_y_i = 0,    str_eq_i = 0;
          >>"%WORK%\probe.c" echo   for (int outer = 1; outer ^<= 1022; outer++) {
          >>"%WORK%\probe.c" echo     int signs[2]; signs[0] = -outer; signs[1] = outer;
          >>"%WORK%\probe.c" echo     for (int s = 0; s ^< 2; s++) {
          >>"%WORK%\probe.c" echo       int i = signs[s];
          >>"%WORK%\probe.c" echo       double xP = pow(2.0, (double)i);
          >>"%WORK%\probe.c" echo       double dP = pow(2.0, (double)(i - 52));
          >>"%WORK%\probe.c" echo       double yP = xP + dP;
          >>"%WORK%\probe.c" echo       if (!first_x_eq_y ^&^& xP == yP) { first_x_eq_y = 1; x_eq_y_i = i;
          >>"%WORK%\probe.c" echo         printf("XEQY i=%%d xP=%%.17g dP=%%.17g yP=%%.17g\n", i, xP, dP, yP); }
          >>"%WORK%\probe.c" echo       char fxP[64], fyP[64], buf[64];
          >>"%WORK%\probe.c" echo       int len;
          >>"%WORK%\probe.c" echo       len = snprintf(buf, 64, "%%.15g", xP);
          >>"%WORK%\probe.c" echo       if (strtod(buf, NULL) != xP) len = snprintf(buf, 64, "%%.17g", xP);
          >>"%WORK%\probe.c" echo       if (buf[strspn(buf, "-0123456789")] == 0) { buf[len++] = '.'; buf[len++] = '0'; buf[len] = 0; }
          >>"%WORK%\probe.c" echo       strcpy(fxP, buf);
          >>"%WORK%\probe.c" echo       len = snprintf(buf, 64, "%%.15g", yP);
          >>"%WORK%\probe.c" echo       if (strtod(buf, NULL) != yP) len = snprintf(buf, 64, "%%.17g", yP);
          >>"%WORK%\probe.c" echo       if (buf[strspn(buf, "-0123456789")] == 0) { buf[len++] = '.'; buf[len++] = '0'; buf[len] = 0; }
          >>"%WORK%\probe.c" echo       strcpy(fyP, buf);
          >>"%WORK%\probe.c" echo       if (!first_str_eq ^&^& xP != yP ^&^& strcmp(fxP, fyP) == 0) {
          >>"%WORK%\probe.c" echo         first_str_eq = 1; str_eq_i = i;
          >>"%WORK%\probe.c" echo         printf("STREQ i=%%d xP=%%.17g yP=%%.17g fxP=%%s fyP=%%s\n", i, xP, yP, fxP, fyP); }
          >>"%WORK%\probe.c" echo     }
          >>"%WORK%\probe.c" echo   }
          >>"%WORK%\probe.c" echo   printf("WALK_SUMMARY: x_eq_y_first_i=%%d str_eq_first_i=%%d\n", x_eq_y_i, str_eq_i);
          >>"%WORK%\probe.c" echo   return 0;
          >>"%WORK%\probe.c" echo }
          "%BADC%" -o "%WORK%\probe.exe" "%WORK%\probe.c"
          if errorlevel 1 ( echo probe build failed & exit /b 0 )
          "%WORK%\probe.exe"
          echo probe exit: %ERRORLEVEL%
      - name: chibicc bringup smoke
        # chibicc is the substantial multi-TU exerciser for the
        # cross-TU linker. All nine TUs compile on macOS / Linux,
        # the multi-TU link emits a working chibicc binary, and
        # that binary produces byte-identical assembly to a gcc-
        # built reference on the self-host sample suite. chibicc's
        # body is POSIX-shaped (fork + execvp + waitpid + glob +
        # dirname + strndup + open_memstream + strtold), so the
        # smoke step is workflow-gated to POSIX hosts.
        if: runner.os != 'Windows'
        shell: bash
        run: python demos/chibicc/smoke.py
      - name: chibicc self-host parity (Linux x86_64 only)
        # Builds chibicc twice (gcc + badc), compares the .s
        # output on a curated sample suite, and asserts the
        # linked binaries return the same exit code. chibicc
        # only emits SysV x86_64 GAS, so the step is gated to
        # the Linux x86_64 lane at the workflow level.
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: python demos/chibicc/self_host.py
      - name: tinycc bringup smoke
        # Vendored tinycc HEAD compiles + multi-TU links across
        # every supported runner: each lane's HOST_MATRIX entry
        # picks the matching target_macros / cpp_defs / TU set.
        run: python demos/tinycc/smoke.py
      - name: tinycc self-host parity
        # Compares `tcc -c` output between a reference tcc built
        # with the host compiler and a stage1 tcc built through
        # badc. HOST_PROFILES in self_host.py picks the per-host
        # TU set plus `TCC_TARGET_*` macros. Every CI lane
        # (Linux x86_64 + aarch64, macOS aarch64, Windows x86_64
        # + ARM64) gates strictly on the five-stage fixed point:
        # samples byte-identical, corpus byte-identical,
        # gen2 == gen3 byte-identical, gen2-self == gen3
        # byte-identical, and the functional hello-world round
        # trip through stage1's own linker. `KNOWN_DRIFT` is
        # empty on every lane; a non-empty set indicates a real
        # regression. Exit code 2 (env_unsuitable) only fires on
        # hosts the harness doesn't recognise -- none of the
        # five CI runners hit that path, so the gate is hard.
        run: python demos/tinycc/self_host.py
      - name: upload tinycc stage1 binary (Windows lanes only)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: tcc-stage1-${{ matrix.os }}
          path: demos/tinycc/.self_host/tcc-stage1*
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 1
      - name: upload tinycc gen2 / gen2-self binaries (Windows lanes only)
        # Both binaries are produced from the same stage1-compiled
        # .o objects; gen2 is host-gcc-linked and works, gen2-self
        # is stage1-linked through tccpe.c and AVs at runtime on
        # Windows arm64. Side-by-side `objdump -p` / `dumpbin
        # /headers` of the two reveals the c5-side link-output
        # structural delta that drives the AV.
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: tcc-gen2-${{ matrix.os }}
          path: |
            demos/tinycc/.self_host/tcc-gen2*
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 1
      - name: probe tcc-stage1 imports vs system DLL exports (Windows lanes only)
        # On windows-11-arm the binary fails to load with
        # STATUS_ENTRYPOINT_NOT_FOUND (0xC0000139). Cross-reference
        # the binary's imports against the actual exports of every
        # DLL it links so the missing symbol surfaces in the log
        # without needing a debugger.
        if: runner.os == 'Windows'
        shell: pwsh
        continue-on-error: true
        run: |
          $stage1 = Get-ChildItem demos/tinycc/.self_host/tcc-stage1* | Select-Object -First 1
          if (-not $stage1) { Write-Host 'no tcc-stage1 present'; exit 0 }
          Write-Host "=== inspecting $($stage1.FullName) ==="
          $arch = $env:PROCESSOR_ARCHITECTURE
          $dumpbin = (Get-ChildItem "C:\Program Files\Microsoft Visual Studio\*\*\VC\Tools\MSVC\*\bin\Host*\*\dumpbin.exe" -ErrorAction SilentlyContinue | Select-Object -First 1)
          if (-not $dumpbin) { Write-Host 'dumpbin not found, skipping'; exit 0 }
          $rawImports = & $dumpbin /imports $stage1.FullName 2>&1 | Out-String
          # Parse `<spaces><hex>  <name>` rows; group by preceding `DLL Name:` line.
          $currentDll = ''
          $importMap = @{}
          foreach ($line in ($rawImports -split "`r?`n")) {
              if ($line -match '^\s+(?<dll>\S+\.dll)$') {
                  $currentDll = $matches['dll'].ToLower()
                  if (-not $importMap.ContainsKey($currentDll)) { $importMap[$currentDll] = New-Object 'System.Collections.Generic.HashSet[string]' }
              }
              elseif ($currentDll -and $line -match '^\s+[0-9A-Fa-f]+\s+(?<sym>[A-Za-z_][A-Za-z0-9_]*)\s*$') {
                  $importMap[$currentDll].Add($matches['sym']) | Out-Null
              }
          }
          foreach ($dll in $importMap.Keys) {
              Write-Host ""
              Write-Host "=== imports from $dll : $($importMap[$dll].Count) symbols ==="
              $dllPath = "C:\Windows\System32\$dll"
              if (-not (Test-Path $dllPath)) { Write-Host "  $dllPath not found, skipping"; continue }
              $rawExports = & $dumpbin /exports $dllPath 2>&1 | Out-String
              $exports = New-Object 'System.Collections.Generic.HashSet[string]'
              foreach ($eline in ($rawExports -split "`r?`n")) {
                  if ($eline -match '^\s+\d+\s+[0-9A-Fa-f]+\s+[0-9A-Fa-f]+\s+(?<sym>[A-Za-z_][A-Za-z0-9_@?$]*)') {
                      $exports.Add($matches['sym']) | Out-Null
                  }
              }
              Write-Host "  $($exports.Count) symbols in $dllPath"
              $missing = @($importMap[$dll]) | Where-Object { -not $exports.Contains($_) }
              if ($missing) {
                  Write-Host "  *** MISSING from $dll ***"
                  $missing | ForEach-Object { Write-Host "    $_" }
              } else {
                  Write-Host "  (all imports resolve)"
              }
          }
      - name: capture stage1 crash under cdb (Windows lanes only)
        # On windows-latest the binary loads cleanly (`-v` returns
        # 0) but every `-c` invocation faults. Run a single sample
        # under cdb with the crash-state dump command so the AV PC
        # + unwind reach the log.
        if: runner.os == 'Windows'
        shell: cmd
        continue-on-error: true
        run: |
          @echo off
          setlocal
          dir demos\tinycc\.self_host\
          rem badc may emit `tcc-stage1` or `tcc-stage1.exe` depending
          rem on the writer; prefer the .exe spelling because cdb's
          rem CreateProcess does not auto-append the extension the way
          rem the Python harness's subprocess.run does.
          set "STAGE1=demos\tinycc\.self_host\tcc-stage1.exe"
          if not exist "%STAGE1%" set "STAGE1=demos\tinycc\.self_host\tcc-stage1"
          if not exist "%STAGE1%" ( echo no tcc-stage1 present & exit /b 0 )
          rem Make a copy with the .exe extension so cdb's CreateProcess
          rem accepts it even when the harness wrote the binary without
          rem the suffix.
          if not exist "%STAGE1%.exe" copy /Y "%STAGE1%" "%STAGE1%.exe" >nul
          if exist "%STAGE1%.exe" set "STAGE1=%STAGE1%.exe"
          set "CDBDIR=x64"
          if /I "%PROCESSOR_ARCHITECTURE%"=="ARM64" set "CDBDIR=arm64"
          set "CDB=C:\Program Files (x86)\Windows Kits\10\Debuggers\%CDBDIR%\cdb.exe"
          if not exist "%CDB%" ( echo cdb not found at "%CDB%" & exit /b 0 )
          echo === cdb at %CDB% ===
          set "SAMPLE=demos\tinycc\.self_host\samples\arithmetic.c"
          if not exist "%SAMPLE%" ( echo sample not present & exit /b 0 )
          set "LOG=%RUNNER_TEMP%\cdb.log"
          if exist "%LOG%" del "%LOG%"
          rem cmd-shell quoting puts the `-c` debugger script in a
          rem single quoted token, then `--` separates from the
          rem inferior + its args. PowerShell's Start-Process
          rem ArgumentList globbed the whole tail into one string
          rem last run; cmd preserves arg boundaries.
          "%CDB%" -logo "%LOG%" -c "g; .lastevent; r; kn 30; lm; qq" -G -g "%STAGE1%" -B demos/tinycc -c "%SAMPLE%" -o "%RUNNER_TEMP%\arith.o"
          echo cdb exit: %ERRORLEVEL%
          if exist "%LOG%" ( echo === cdb log === & type "%LOG%" ) else ( echo no cdb log produced )
      - name: capture gen2-self crash under cdb (Windows lanes only)
        # gen2-self is the stage1-linked tcc binary built from the
        # gen2-compiled tinycc objects -- functionally identical to
        # gen2, except linked by stage1's tccpe-driven PE writer
        # rather than host gcc + mingw ld. On Windows arm64 the
        # gen2-self binary AVs early. Run it under cdb with the
        # same script the stage1 step uses so the AV PC + unwind
        # land in the log.
        if: runner.os == 'Windows'
        shell: cmd
        continue-on-error: true
        run: |
          @echo off
          setlocal
          set "GEN2SELF=demos\tinycc\.self_host\tcc-gen2-self.exe"
          if not exist "%GEN2SELF%" set "GEN2SELF=demos\tinycc\.self_host\tcc-gen2-self"
          if not exist "%GEN2SELF%" ( echo no tcc-gen2-self present & exit /b 0 )
          if not exist "%GEN2SELF%.exe" copy /Y "%GEN2SELF%" "%GEN2SELF%.exe" >nul
          if exist "%GEN2SELF%.exe" set "GEN2SELF=%GEN2SELF%.exe"
          set "CDBDIR=x64"
          if /I "%PROCESSOR_ARCHITECTURE%"=="ARM64" set "CDBDIR=arm64"
          set "CDB=C:\Program Files (x86)\Windows Kits\10\Debuggers\%CDBDIR%\cdb.exe"
          if not exist "%CDB%" ( echo cdb not found at "%CDB%" & exit /b 0 )
          set "SAMPLE=demos\tinycc\.self_host\samples\arithmetic.c"
          if not exist "%SAMPLE%" ( echo sample not present & exit /b 0 )
          set "LOG=%RUNNER_TEMP%\cdb-gen2-self.log"
          if exist "%LOG%" del "%LOG%"
          "%CDB%" -logo "%LOG%" -c "g; .lastevent; r; kn 30; lm; qq" -G -g "%GEN2SELF%" -B demos/tinycc -c "%SAMPLE%" -o "%RUNNER_TEMP%\arith.gen2self.o"
          echo cdb exit: %ERRORLEVEL%
          if exist "%LOG%" ( echo === cdb gen2-self log === & type "%LOG%" ) else ( echo no cdb log produced )
      - name: stb header-only smoke
        # The densest demo: a single TU pulls in six stb_*.h
        # headers (stb_sprintf, stb_perlin, stb_image_write,
        # stb_image, stb_ds, stb_rect_pack) with their
        # `STB_*_IMPLEMENTATION` macros defined, then exercises
        # one scenario per header (sprintf round-trip, Perlin
        # noise range, PNG encode-decode, stretchy-array sums,
        # skyline rect pack). Catches header-only-library
        # idioms: heavy macro use, function-type typedefs,
        # 2D-array params, local arrays with runtime
        # initializers, float arithmetic in static initializers.
        # PSD is skipped via STBI_NO_PSD pending an aarch64
        # codegen-drift regression specific to that decoder.
        run: python demos/stb/smoke.py
      - name: gui_hello build-only smoke
        # Three GUI demos -- Win32, X11, Cocoa via objc_msgSend --
        # cross-compiled to all five supported targets. Build-only
        # because CI runners don't have display servers / Window
        # Stations / XQuartz; a developer runs the produced
        # binary locally to see the actual window.
        run: python demos/gui_hello/smoke.py
      - name: nt_loader / nt_hello smoke
        # Builds both NT-flavoured demos for windows-x64 and
        # windows-arm64 and validates the Subsystem byte (CUI
        # for nt_loader, NATIVE for nt_hello). On the two Windows
        # runners the loader is additionally executed against
        # nt_hello as a codegen canary: the loader can't actually
        # launch a NATIVE image without SeTcbPrivilege, but the
        # smoke asserts it reaches every milestone log line in
        # order and exits 1 with one of the known privilege-gate
        # NTSTATUSes. An AV / truncated output / unexpected
        # NTSTATUS would signal a c5 Windows-codegen regression.
        run: python demos/nt_loader/smoke.py

  pressure:
    # Run the test suite and the functional demos with the register
    # allocator's per-bank counts capped to a fixed N, to catch
    # spill / scratch / reload bugs that only appear under pressure.
    # The caps are read only with the codegen_test feature
    # (BADC_MAX_GPR / BADC_MAX_FPR). Value-checking tests and the
    # demos must produce the same result at any pressure; exact-shape
    # tests pin their own pressure through with_pool_size_override, so
    # the global cap does not affect them. N=1 is excluded: it leaves
    # a single register per bank, which the lua VM call path cannot
    # yet satisfy (tracked with a TODO in the allocator).
    name: pressure N=${{ matrix.pressure }} (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
        pressure: [2, 3, 5, 7, 8, 9, 16]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      BADC_MAX_GPR: ${{ matrix.pressure }}
      BADC_MAX_FPR: ${{ matrix.pressure }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: Swatinem/rust-cache@v2
        with:
          key: pressure-${{ matrix.os }}
      - name: build codegen_test binary
        run: cargo build --release --locked --features "codegen_test full"
      - name: cargo test under pressure
        run: cargo test --release --locked --features "codegen_test full" --lib
      - name: demos under pressure
        run: |
          set -e
          export BADC="$PWD/target/release/badc"
          for d in sqlite3 miniz kissfft bzip2 tweetnacl monocypher bearssl lua stb quickjs raylib curl; do
            echo "::group::$d (N=${{ matrix.pressure }})"
            python "demos/$d/smoke.py"
            echo "::endgroup::"
          done

  features:
    name: feature combos
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: features
      # Explicit matrix of feature flags. Each row mirrors a way a real
      # consumer might depend on the crate. If you add a new feature to
      # Cargo.toml, add a row here so an empty / single-feature config
      # can't silently regress.
      - name: default (std)
        run: cargo build --locked --verbose
      - name: --no-default-features --lib
        run: cargo build --locked --no-default-features --lib --verbose
      - name: --all-features
        run: cargo build --locked --all-features --verbose

  snapshots-clean:
    name: snapshots clean
    runs-on: ubuntu-latest
    needs: test
    # Snapshot drift is independent of which test lane failed; the
    # regenerator only needs a working ubuntu-latest test (which is
    # the runner this job uses). Don't block on Windows / aarch64
    # regressions.
    if: ${{ !cancelled() }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: Swatinem/rust-cache@v2
        with:
          key: snapshots-clean
      - name: install llvm-objdump
        # scripts/snapshots.py prefers llvm-objdump over GNU objdump so
        # the disassembly text is determined by `badc`'s output rather
        # than the host's binutils choice. The committed snapshots were
        # produced with llvm-objdump; require it here too.
        run: sudo apt-get update -y && sudo apt-get install -y llvm
      - name: build badc release
        run: cargo build --release --locked --features full
      - name: regenerate snapshots
        run: python3 scripts/snapshots.py
      - name: verify no diff
        run: |
          if ! git diff --quiet tests/snapshots/; then
            echo "::error::tests/snapshots/ drifted from the committed copy"
            git --no-pager diff --stat tests/snapshots/
            git --no-pager diff tests/snapshots/ | head -200
            exit 1
          fi

  perf-table:
    name: perf comparison (${{ matrix.os }})
    needs: test
    # Run the perf comparison whenever the test matrix has finished,
    # even if some lane failed. Cross-OS test failures (e.g. a Windows
    # codegen regression) should not block visibility on the Linux perf
    # delta; the matrix runs only on Linux runners anyway.
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    # quickjs_bench builds the full engine four times (badc, badc -O,
    # clang -O0, clang -O2) and the CPython comparison builds the
    # interpreter four more times; allow headroom over the lighter fixtures.
    timeout-minutes: 30
    # Don't gate CI on perf numbers -- a regression should surface in
    # the job summary but not block the merge. Hard failures from the
    # harness (no compilers found, fixture missing) still fail the job.
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: Swatinem/rust-cache@v2
        with:
          key: perf-${{ matrix.os }}
      - name: build badc release
        run: cargo build --release --locked --features full
      - name: fetch vendored tinycc sources
        run: python3 demos/tinycc/setup.py
      - name: fetch vendored perf fixture sources
        # tests/perf/{crypto,compress,stb,sqlite}.c each pull a
        # header / amalgamation from a demos/* directory. Those
        # sources are gitignored and only land after the matching
        # setup.py runs; without this step the perf harness sees a
        # `file not found` for every fixture beyond fib/qsort.
        run: |
          python3 demos/tweetnacl/setup.py
          python3 demos/miniz/setup.py
          python3 demos/stb/setup.py
          python3 demos/sqlite3/setup.py
          python3 demos/quickjs/setup.py
      - name: build tcc for the host
        run: bash tests/perf/build_tcc.sh
      - name: run perf harness + write to job summary
        run: |
          python3 tests/perf/run.py | tee /tmp/perf.md
          {
            echo "## badc vs tcc / clang on fib + qsort (${{ matrix.os }})"
            echo ""
            cat /tmp/perf.md
          } >> "$GITHUB_STEP_SUMMARY"
      - name: cpython build comparison (badc/clang, -O0/-O)
        # Builds the interpreter four times (badc and clang, each at -O0 and
        # -O) and reports per-binary section sizes plus a runtime
        # microbenchmark. continue-on-error so a build/bench hiccup leaves the
        # fib/qsort table intact in the summary.
        continue-on-error: true
        run: |
          python3 demos/python/compare_compilers.py | tee /tmp/cpython_cmp.md
          cat /tmp/cpython_cmp.md >> "$GITHUB_STEP_SUMMARY"

  # Build the Tcl 8.6.14 interpreter with badc and run the upstream
  # test suite (tests/all.tcl). Isolated from the `test` job because the
  # 169-unit build plus the full suite exceeds that job's 10-minute
  # budget. POSIX only; Windows is excluded (the build runs configure +
  # make). The macOS-specific codegen and header fixes the suite
  # exercises are also pinned by cargo fixtures, so a failure here flags
  # a suite-level regression rather than the only coverage.
  tcl:
    name: tcl suite (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
    runs-on: ${{ matrix.os }}
    # The build + full suite runs ~4-5 min warm, ~8-10 min on a cold
    # rust-cache; 15 leaves headroom without masking a hang.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: Swatinem/rust-cache@v2
        with:
          key: tcl-${{ matrix.os }}
      - name: build badc
        run: cargo build --release --locked --features full --bin badc
      - name: tcl smoke (build tclsh + run tests/all.tcl)
        run: python demos/tcl/smoke.py

  cpython:
    # One no-make build for every target: build.py compiles CPython's
    # all-builtin link set with badc (POSIX from the committed per-target
    # manifest; Windows from PCbuild/pythoncore.vcxproj) and runs the tier-1
    # test slice. setup.py fetches the source and the vendored frozen-module
    # headers, so no lane runs make. badc cross-compiles, but each lane builds
    # and runs natively on its own runner.
    name: cpython (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, target: macos-aarch64, label: macos-arm64, test_flag: --tier2 }
          - { os: ubuntu-latest, target: linux-x64, label: ubuntu-x64, test_flag: --tier2 }
          - { os: ubuntu-24.04-arm, target: linux-aarch64, label: ubuntu-arm64, test_flag: --tier2 }
          - { os: windows-latest, target: windows-x64, label: windows-x64, test_flag: --tier2 }
          - { os: windows-11-arm, target: windows-arm64, label: windows-arm64, test_flag: --tier2 }
    runs-on: ${{ matrix.os }}
    # Hang guard for a cold rust-cache; a warm build + slice runs well under it.
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: Swatinem/rust-cache@v2
        with:
          key: cpython-${{ matrix.target }}
      - name: build badc
        run: cargo build --release --locked --features full --bin badc
      - name: cpython no-make build + test slice
        run: python demos/python/build.py --target=${{ matrix.target }} ${{ matrix.test_flag }}

  nasm:
    # Build NASM 2.16.03 with badc (no make) and run NASM's own golden test
    # suite against it -- a self-validating oracle (each case compares the
    # assembled output to a committed golden), so no reference build is needed.
    # setup.py fetches the release (which ships the generated instruction
    # tables and the suite); smoke.py compiles the fixed TU list directly and
    # installs config/config.h from a frozen per-target config (no ./configure,
    # no make) -- so every target, native Windows included, needs only badc +
    # python.
    name: nasm (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, label: macos-arm64 }
          - { os: ubuntu-latest, label: ubuntu-x64 }
          - { os: ubuntu-24.04-arm, label: ubuntu-arm64 }
          - { os: windows-latest, label: windows-x64 }
          - { os: windows-11-arm, label: windows-arm64 }
    runs-on: ${{ matrix.os }}
    # Two badc builds (-O0 and -O) + two golden-suite runs; warm cache ~5 min.
    # The smoke self-limits each golden-suite run with a subprocess timeout, so
    # this is only a backstop -- a job here must never approach 30 min.
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: Swatinem/rust-cache@v2
        with:
          key: nasm-${{ matrix.label }}
      - name: build badc
        run: cargo build --release --locked --features full --bin badc
      - name: nasm setup (fetch source)
        run: python demos/nasm/setup.py
      - name: nasm smoke (build + golden test suite)
        run: python demos/nasm/smoke.py

  nasm-selfhost:
    # Self-hosting cross-check on the POSIX targets: build CPython and nasm
    # with badc, then run NASM's golden suite with the badc-built Python
    # interpreter driving the badc-built assembler. Windows is excluded -- the
    # suite harness needs subprocess (the badc interpreter's _posixsubprocess).
    name: nasm selfhost (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, label: macos-arm64 }
          - { os: ubuntu-latest, label: ubuntu-x64 }
          - { os: ubuntu-24.04-arm, label: ubuntu-arm64 }
    runs-on: ${{ matrix.os }}
    # Builds CPython (with a cold rust-cache) + nasm + two suite runs.
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: Swatinem/rust-cache@v2
        with:
          key: nasm-selfhost-${{ matrix.label }}
      - name: build badc
        run: cargo build --release --locked --features full --bin badc
      - name: badc-python drives the badc-nasm golden suite
        run: python demos/nasm/selfhost.py

  yasm:
    # Build the yasm 1.3.0 assembler with badc (no make, no configure) and
    # byte-compare its output against a host-cc reference build. yasm's build
    # derives sources at build time: badc builds the C generators, and the x86
    # instruction tables come from gen_x86_insn.py run under the badc-built
    # CPython (a self-hosting cross-check). POSIX lanes: the byte-parity
    # reference still uses the host cc, so the native-Windows lane needs
    # committed goldens instead and is tracked separately (TODO).
    name: yasm (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, label: macos-arm64 }
          - { os: ubuntu-latest, label: ubuntu-x64 }
          - { os: ubuntu-24.04-arm, label: ubuntu-arm64 }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: Swatinem/rust-cache@v2
        with:
          key: yasm-${{ matrix.label }}
      - name: build badc
        run: cargo build --release --locked --features full --bin badc
      - name: yasm setup (fetch source)
        run: python demos/yasm/setup.py
      - name: yasm smoke (badc build + byte-parity, badc-python table-gen)
        run: python demos/yasm/smoke.py

  edk2:
    # Build a UEFI application from real EDK II MdePkg sources with badc's own
    # linker (PE32+ EFI application, no GenFw) for X64 and AArch64. badc
    # cross-compiles both EFI images from every host, so the build runs on all
    # five runners. The OVMF/QEMU boot is a distinct dimension: it runs on the
    # Linux lanes (where QEMU + OVMF/AAVMF come from apt); the macOS / Windows
    # lanes have no easy QEMU, so smoke.py auto-skips the boot there and stands
    # on the build + PE-format checks.
    name: edk2 (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, label: ubuntu-x64, qemu: true }
          - { os: ubuntu-24.04-arm, label: ubuntu-arm64, qemu: true }
          - { os: macos-latest, label: macos-arm64 }
          - { os: windows-latest, label: windows-x64 }
          - { os: windows-11-arm, label: windows-arm64 }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: Swatinem/rust-cache@v2
        with:
          key: edk2-${{ matrix.label }}
      - name: install QEMU + OVMF/AAVMF firmware (Linux only)
        if: matrix.qemu
        run: |
          sudo apt-get update -y
          sudo apt-get install -y qemu-system-x86 qemu-system-arm ovmf qemu-efi-aarch64
      - name: build badc
        run: cargo build --release --locked --features full --bin badc
      - name: edk2 setup (fetch the MdePkg subset)
        run: python demos/edk2/setup.py
      - name: edk2 smoke (build the UEFI app for X64 + AArch64; boot where QEMU is present)
        env:
          OVMF_CODE: /usr/share/OVMF/OVMF_CODE.fd
          OVMF_VARS: /usr/share/OVMF/OVMF_VARS.fd
          AAVMF_CODE: /usr/share/AAVMF/AAVMF_CODE.fd
          AAVMF_VARS: /usr/share/AAVMF/AAVMF_VARS.fd
          # The build is the hard gate; the OVMF boot is best-effort until the
          # runner firmware paths + QEMU stability are confirmed.
          BADC_EDK2_BOOT_OPTIONAL: "1"
        run: python demos/edk2/smoke.py

  qemu:
    # Compile every translation unit of QEMU 11.0.2's qemu-system-aarch64 (1683
    # units: the emulator objects + its utility library) with badc, archive the
    # library with badc's --ar, and link the emulator -- preferring badc's own
    # linker and falling back to cc-linking badc's objects where the linker's
    # aarch64 reloc support is still incomplete (TODO). The gate is that badc
    # compiles every unit and the linked emulator reports its version.
    #
    # setup.py fetches the source + captured meson build config from the
    # vendor-deps release (GITHUB_TOKEN inherited from the workflow env). Only
    # the aarch64 Linux config is vendored so far; the x86_64 Linux and macOS
    # configs are pending capture + validation (TODO), so this is a single lane.
    name: qemu (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-24.04-arm, label: ubuntu-arm64 }
    runs-on: ${{ matrix.os }}
    # badc build (warm cache) + ~1683-unit compile + link. The compile is the
    # long pole; 30 min is a backstop it must never approach.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: Swatinem/rust-cache@v2
        with:
          key: qemu-${{ matrix.label }}
      - name: install QEMU compile + link deps
        # glib headers (no badc shim), and the zlib / libfdt shared objects the
        # emulator links against; their headers come from the demo's shim.
        run: |
          sudo apt-get update -y
          sudo apt-get install -y pkg-config libglib2.0-dev zlib1g-dev libfdt-dev gdb
      - name: build badc
        run: cargo build --release --locked --features full --bin badc
      - name: qemu setup (fetch source + build config)
        run: python demos/qemu/setup.py
      - name: qemu smoke (badc build + self-link + run)
        # Gate on the run, not just compile + self-link: the runner builds at a
        # long path whose length lands the init_array on the .data boundary, so
        # a regression in the boundary handling faults the emulator at startup.
        env:
          BADC_QEMU_REQUIRE_RUN: "1"
        run: python demos/qemu/smoke.py
