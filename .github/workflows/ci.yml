name: CI

on:
  pull_request:
  push:
    branches: [master]

# A pushed branch + the PR it opens would otherwise run twice. Cancel
# the older run on every new push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  # wine env: applied workflow-wide so wineboot priming AND the
  # per-test wine invocations both see them. WINEDEBUG silences the
  # debug spam that otherwise floods CI logs. WINEDLLOVERRIDES
  # disables the three services (winemenubuilder, mscoree, mshtml)
  # that hang waiting for an X server / network on headless CI.
  # Non-wine runners ignore these.
  WINEDEBUG: "-all"
  WINEDLLOVERRIDES: "winemenubuilder.exe=d;mscoree=d;mshtml=d"
  # The demo smokes' `setup.py` files download archives from the
  # `vendor-deps-v1` release on this repo. While the repo is
  # private, anonymous GitHub release downloads return 404 -- the
  # auto-provisioned token authenticates the api.github.com path
  # in `scripts/vendor_deps/_fetch.py`. Once the repo is public
  # this can be dropped (the no-token path will work).
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
      # Sources and docs are ASCII-only. Smart quotes / em dashes /
      # arrows tend to sneak in via copy-paste and rendered editor
      # autocorrect; keep them out at the gate.
      - name: ASCII-only sources
        run: |
          if grep -rPn '[^\x00-\x7F]' \
              --include='*.md' --include='*.rs' --include='*.c' \
              --include='*.toml' --include='*.yml' \
              --exclude-dir=target --exclude-dir=.git . ; then
            echo
            echo "::error::Non-ASCII characters found above."
            echo "Common replacements: -> for U+2192, -- for em dash (U+2014), ... for ellipsis (U+2026)."
            exit 1
          fi

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
          - windows-latest
          - windows-11-arm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        # Pin Python so `python` resolves consistently on every
        # runner (Linux + macOS use `python3` by default; Windows
        # ships `python` but no `python3` on PATH). The smoke
        # script invokes `python demos/sqlite3/smoke.py` and
        # expects the modern stdlib (urllib, zipfile, pathlib).
        with:
          python-version: '3.x'
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}
      - name: install wine (linux only)
        # `ubuntu-24.04-arm` -> native_pe_arm64 tests via wine 10's
        # aarch64-windows DLL set.
        # `ubuntu-latest`    -> native_pe_x64 tests via wine's
        # x86_64-windows DLL set, as a cross-check against the
        # `windows-latest` runner: both should accept the same PE,
        # so a divergence flags either a wine bug or a real format
        # issue. Skip on every other runner -- the tests cfg-gate
        # to their respective triples.
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-24.04-arm'
        run: |
          sudo apt-get update -y
        # sudo apt-get install -y wine
        #
        # - name: prime wine prefix (linux only)
        # First-time `wine` invocation creates `~/.wine`, which on a
        # fresh CI runner takes ~60s and would race the parallel test
        # processes (cargo test runs tests on threads, each shelling
        # out to wine; without a primed prefix they all try to
        # initialize it concurrently and time out). Run wineboot
        # once up front so every test sees a ready prefix.
        #
        # On headless CI, wineboot's default services (winemenubuilder,
        # mscoree, mshtml) try to talk to an X server / network and
        # stall indefinitely, so we disable them via
        # WINEDLLOVERRIDES. The `timeout` guard caps the step at 90s
        # so a hanging wineboot can't block the whole job. After
        # priming, `wineserver -k` shuts down the background server
        # so the per-test `wine` invocations spawn a fresh, healthy
        # one rather than reusing whatever state is left in memory.
        #
        # if: matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-24.04-arm'
        # run: |
        #  timeout 90 wineboot --init || true
        #  wineserver -k || true
        # env:
        #  # No display server on the CI runner; force wine to skip
        #  # any X11 init paths that might still be reachable past
        #  # WINEDLLOVERRIDES.
        #  DISPLAY: ""
      - name: cargo test (default features)
        # `BADC_RUN_WINE` maybe be used in the macOS / Linux -> wine -> PE
        # test lane; without it the PE-via-WINE tests skip (so a
        # routine `cargo test` on a developer machine doesn't shell
        # out to wine). We set it on the two ubuntu runners that
        # also installed wine in the steps above.
        #
        # env:
        #  BADC_RUN_WINE: ${{ (matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-24.04-arm') && '1' || '' }}
        #
        # Each runner exercises the native-codegen path that targets
        # its own host:
        #  * macos-latest        -> src/c4/tests/native.rs (Mach-O,
        #    `/usr/bin/codesign`) + src/c4/tests/jit.rs (in-process
        #    JIT via MAP_JIT + pthread_jit_write_protect_np). The
        #    PE-via-WINE tests in src/c4/tests/native_pe_x64.rs
        #    compile here too but skip at runtime when WINE isn't
        #    installed (it isn't on the macos-latest image).
        #  * ubuntu-24.04-arm    -> src/c4/tests/native_elf.rs
        #    (Linux/aarch64 ELF, host kernel exec) +
        #    src/c4/tests/jit.rs (mprotect-based JIT) +
        #    src/c4/tests/native_pe_arm64.rs through wine 10's
        #    aarch64-windows DLL set (installed in the step above).
        #  * ubuntu-latest       -> src/c4/tests/native_elf_x64.rs
        #    (Linux/x86_64 ELF, host kernel exec) +
        #    src/c4/tests/jit.rs (mprotect-based JIT) +
        #    src/c4/tests/native_pe_x64.rs through wine's
        #    x86_64-windows DLL set (installed in the step above)
        #    as a cross-check against the windows-latest runner.
        #  * windows-latest      -> src/c4/tests/native_pe_x64.rs
        #    (Windows/x86_64 PE, host kernel exec). Runs the
        #    produced .exe directly; no JIT lane on Windows because
        #    the in-process JIT loader hasn't been ported.
        #  * windows-11-arm      -> src/c4/tests/native_pe_arm64.rs
        #    (Windows/AArch64 PE, host kernel exec). Same shape as
        #    the windows-latest lane but for the AArch64 backend.
        # The backend test modules are cfg-gated to their
        # respective triples, so the other runners compile them out
        # and only verify the VM, lexer, parser, codegen-as-bytecode,
        # and optimizer paths.
        run: cargo test --locked --verbose
      - name: cargo build --no-default-features --lib
        # The no_std variant -- no StdHost adapter, alloc only. Library-
        # only because the binary needs std for argv / stdio.
        run: cargo build --locked --no-default-features --lib --verbose
      - name: sqlite3 smoke
        # Fetch upstream sqlite, compile `sqlite3.c + shell.c`
        # with the freshly-built badc, and round-trip the
        # in-memory and file-backed scenarios at both -O and noO.
        # Same script across all five runners thanks to the
        # `actions/setup-python` step above.
        run: |
          cargo build --release --locked
          python demos/sqlite3/smoke.py
      - name: miniz smoke (amalg + TU + archive)
        # Same shape as the sqlite step but smaller: ~9k LOC of
        # integer + bit-twiddle deflate code. Compresses + uncompresses
        # a known buffer at both -O and noO and checks CRC32 / Adler32
        # against RFC 1950 / 3309 reference values. Runs three build
        # flavours (single-source amalgamation, separate-compilation
        # `-c` + link, and `--ar` archive + `-l`) at both -O levels
        # to exercise the linker pipeline end-to-end.
        run: python demos/miniz/smoke.py
      - name: kissfft smoke (amalg + TU + archive)
        # First real FP exerciser. Builds KISS FFT + a real-only
        # add-on through badc and runs an impulse FFT, a forward
        # +inverse round-trip, and a single-frequency sine real
        # FFT at both -O and noO. Catches FP libm boundary
        # regressions (xmm0 / d0 return value, FP arg masks
        # through the optimizer, ...). Runs the same three build
        # flavours as miniz so the multi-TU FP paths get exercised.
        run: python demos/kissfft/smoke.py
      - name: bzip2 smoke (amalg + TU + archive)
        # Third non-trivial demo. Integer + bit-twiddle heavy:
        # BWT, move-to-front, run-length encoding, and Huffman
        # coding through a 128-bit bitstream packer. Compresses +
        # decompresses a 600-byte buffer at blockSize 1 and 9 at
        # both -O and noO. Different code shape from miniz's
        # deflate. Runs the same three build flavours so the
        # bzip2 library bundles correctly through `--ar`.
        run: python demos/bzip2/smoke.py
      - name: tweetnacl smoke (amalg + TU + archive)
        # TweetNaCl is the auditable NaCl implementation
        # (Salsa20, Poly1305, X25519, Ed25519, SHA-512) in
        # ~700 lines of portable C99. The five-scenario driver
        # asserts a SHA-512 known-answer, an RFC 8032 Ed25519
        # vector (deterministic signature byte-for-byte), and
        # secretbox / box / sign round trips. Runs the same
        # three build flavours so the multi-TU + archive paths
        # get exercised across `-O` and no-`-O`.
        run: python demos/tweetnacl/smoke.py
      - name: monocypher smoke (amalg + TU + archive)
        # MonoCypher is a modern auditable crypto library:
        # Chacha20-Poly1305 AEAD, BLAKE2b, X25519, optional
        # SHA-512 + RFC 8032 Ed25519. Five scenarios:
        # SHA-512(`abc`), BLAKE2b(`abc`), RFC 8032 Ed25519
        # vector 1 (sign + verify), AEAD round trip, X25519
        # Diffie-Hellman. Same build flavour matrix as the
        # other library demos.
        run: python demos/monocypher/smoke.py
      - name: monocypher ssa cross-function probe (Linux x86_64 only)
        # The SSA emit on x86_64 produces correct bytes for every
        # function in isolation but miscompiles monocypher's
        # Ed25519 chain when a specific pool / SSA function mix is
        # in play. Aarch64 doesn't reproduce. This step builds
        # the binary under two reproductions and captures the
        # output so a future investigation has live artifacts:
        #
        #  /tmp/mono_only  -- BADC_SSA_ONLY_PC=62595,396 narrows
        #                     SSA emit to two functions; the rest
        #                     fall back to pool. Reproduces the
        #                     Ed25519 signature mismatch.
        #  /tmp/mono_store -- BADC_SSA_STORE_SPILL_ADDR=1 re-opens
        #                     the spill-tolerant Store-addr path
        #                     in every SSA-emitted function;
        #                     reproduces the same failure under
        #                     the default SSA function set.
        #
        # `if: always()` so the probe still runs after a prior
        # step failure; `continue-on-error` because the probe is
        # diagnostic, not a gate.
        if: always() && matrix.os == 'ubuntu-latest'
        continue-on-error: true
        shell: bash
        run: |
          set -u
          # Earlier `cargo test` may have failed before the
          # release build runs, so build badc explicitly here.
          cargo build --release --locked
          python demos/monocypher/setup.py
          python scripts/amalgamate.py -o /tmp/mono_full.c \
              demos/monocypher/monocypher.c \
              demos/monocypher/monocypher-ed25519.c \
              demos/monocypher/smoke_main.c
          BADC=target/release/badc
          BADC_USE_SSA_EMIT=1 BADC_SSA_ONLY_PC=62595,396 \
              "$BADC" -I demos/monocypher /tmp/mono_full.c -o /tmp/mono_only
          BADC_USE_SSA_EMIT=1 BADC_SSA_STORE_SPILL_ADDR=1 \
              "$BADC" -I demos/monocypher /tmp/mono_full.c -o /tmp/mono_store
          ulimit -c unlimited || true
          mkdir -p /tmp/cores
          sudo bash -c 'echo "/tmp/cores/core.%p" > /proc/sys/kernel/core_pattern' || true
          for bin in /tmp/mono_only /tmp/mono_store; do
              echo "=== $bin ==="
              set +e
              "$bin" > "${bin}.out" 2> "${bin}.err"
              echo "exit: $?"
              set -e
              echo "--- stdout ---"
              cat "${bin}.out" || true
              echo "--- stderr ---"
              cat "${bin}.err" || true
          done
          # ubuntu-latest doesn't ship gdb by default; install
          # it before the diagnostic run.
          sudo apt-get update -y >/dev/null 2>&1 || true
          sudo apt-get install -y gdb >/dev/null 2>&1 || true
          # Run the failing binary under gdb. The smoke exits via
          # a clean fprintf + return, not a fault, so set a
          # one-shot breakpoint on `fprintf` and dump the
          # surrounding stack frame at the first hit. That brings
          # back the signature buffer's address (rdi) plus the
          # call chain that produced it.
          if command -v gdb >/dev/null; then
              # Break inside crypto_eddsa_reduce just after the
              # call to load32_le_buf returns and dump the
              # 64-byte local `u32 x[16]` array. The return-from-
              # call site lives at $rip = entry_va + 0x98 in
              # both SSA-emitted variants; setting the breakpoint
              # on the matching `mov %rax, %r15` instruction
              # lets us snapshot the freshly-populated array.
              #
              # Also dump the same array from the second probe
              # build (BADC_SSA_STORE_SPILL_ADDR=1) to contrast
              # the two failure paths. The pool-emitted equivalent
              # would write the LE32 bytes byte-for-byte; a
              # divergence here pinpoints the SSA emit's bug.
              # The local `u32 x[16]` lives at $rbp-0x40 inside
              # crypto_eddsa_reduce. The function's input
              # `expanded` was passed in via rsi at call entry;
              # load32_le_buf doesn't write through rsi and the
              # SSA emit preserves it across the body, so dumping
              # 64 bytes from $rsi gives us a side-by-side view
              # of the source buffer and the freshly-converted
              # x[16].
              #
              # If load32_le_buf is correct, the two dumps are
              # byte-identical (load32_le stores back into the
              # same little-endian layout it reads from). A
              # divergence implicates load32_le_buf; agreement
              # shifts blame downstream to mod_l.
              #
              # The breakpoint fires twice: once for the
              # `r = hash_reduce(...)` call and once for the
              # subsequent `h = hash_reduce(...)`. Capture both.
              gdb -batch \
                  -ex 'set pagination off' \
                  -ex 'set print elements 256' \
                  -ex 'break *(crypto_eddsa_reduce + 0x98)' \
                  -ex 'break fprintf' \
                  -ex run \
                  -ex 'printf "=== eddsa_reduce hit 1 ===\n"' \
                  -ex 'printf "--- x[16] just after load32_le_buf ---\n"' \
                  -ex 'x/64bx $rbp-0x40' \
                  -ex 'printf "--- expanded (source) at $rsi ---\n"' \
                  -ex 'x/64bx $rsi' \
                  -ex 'printf "--- registers ---\n"' \
                  -ex 'info registers rax rbx rdi rsi rdx rcx r10 r11 r12 r13 r14 r15' \
                  -ex 'bt 4' \
                  -ex 'continue' \
                  -ex 'printf "=== eddsa_reduce hit 2 ===\n"' \
                  -ex 'printf "--- x[16] just after load32_le_buf ---\n"' \
                  -ex 'x/64bx $rbp-0x40' \
                  -ex 'printf "--- expanded (source) at $rsi ---\n"' \
                  -ex 'x/64bx $rsi' \
                  -ex 'bt 4' \
                  -ex 'continue' \
                  -ex 'printf "=== fprintf hit (signature mismatch) ===\n"' \
                  -ex 'frame 1' \
                  -ex 'printf "--- sig (got) ---\n"' \
                  -ex 'x/64bx $rbp-0x140' \
                  -ex 'printf "--- expected_sig ---\n"' \
                  -ex 'x/64bx $rbp-0x80' \
                  -ex 'bt 20' \
                  /tmp/mono_only \
                  > /tmp/gdb_post.log 2>&1 || true
              echo "--- gdb log ---"
              cat /tmp/gdb_post.log || true
          else
              echo "::warning::gdb not available after install attempt"
          fi
      - name: upload monocypher ssa probe artifacts (Linux x86_64 only)
        if: always() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: monocypher-ssa-probe
          path: |
            /tmp/mono_only
            /tmp/mono_only.out
            /tmp/mono_only.err
            /tmp/mono_store
            /tmp/mono_store.out
            /tmp/mono_store.err
            /tmp/gdb_post.log
            /tmp/cores
          if-no-files-found: warn
          retention-days: 7

      - name: bearssl smoke (TU + archive + upstream KATs)
        # Builds every .c file under demos/bearssl/src into a
        # static archive, links it against the bundled
        # smoke_main.c (FIPS 180-2 SHA-256/224, RFC 4231
        # HMAC-SHA-256, RFC 5869 HKDF-SHA-256) and against
        # upstream test/test_crypto.c run with a whitelisted
        # set of fast KAT suites covering hashes, MACs, KDFs,
        # DRBGs, the TLS PRF, ChaCha20 and Poly1305. Slow
        # AES / DES KAT loops are tracked under TODO.
        run: python demos/bearssl/smoke.py
      - name: lua smoke (multi-TU + upstream test suite)
        # Vendored Lua 5.5.0 sources compile + multi-TU link
        # through badc on every supported lane, and the curated
        # 24-script `lua-tests` subset (bitwise, closures,
        # coroutines, math, pattern, sort, string, table, utf8,
        # vararg, plus the `T`-driven api / gc / gengc / memerr
        # / tracegc) runs against the produced interpreter at
        # both -O and noO.
        #
        # macOS / Linux x86_64 / Linux aarch64 gate strictly.
        # The Windows lanes match the chibicc / tinycc skip-on-2
        # convention: smoke.py exits 2 when the build is green
        # but Microsoft msvcrt-specific test idiosyncrasies fire
        # (`math.lua` ldexp/frexp, `cstack.lua` recursion limit,
        # `constructs.lua` / `strings.lua` formatting on
        # AArch64). The c5 build + setjmp / longjmp paths
        # themselves are still strict: every cargo `native_pe_*`
        # fixture parity test runs against real Windows.
        shell: bash
        run: python demos/lua/smoke.py || test $? -eq 2
      - name: probe Windows msvcrt setjmp + capture lua crash
        # Diagnostic for the Windows runtime gaps the lua smoke
        # surfaces. Runs only when the smoke fails. Two probes:
        #   1. dump msvcrt.dll exports filtered to setjmp /
        #      longjmp so the binding choice in <setjmp.h>
        #      stops being a guess on this lane.
        #   2. rebuild a fresh lua.exe (the smoke wipes its
        #      tempdir) and run a quick assertion-failing
        #      script under cdb so the crash PC + module +
        #      unwind reach the log.
        if: failure() && runner.os == 'Windows'
        shell: cmd
        continue-on-error: true
        run: |
          @echo off
          setlocal
          echo === msvcrt setjmp / longjmp exports ===
          set "DUMPBIN="
          for /f "delims=" %%P in ('dir /b /s "C:\Program Files\Microsoft Visual Studio\*\*\VC\Tools\MSVC\*\bin\Host*\*\dumpbin.exe" 2^>nul') do (
            if not defined DUMPBIN set "DUMPBIN=%%P"
          )
          if not defined DUMPBIN ( echo dumpbin not on PATH; skipping & goto :build )
          "%DUMPBIN%" /exports C:\Windows\System32\msvcrt.dll | findstr /i "setjmp longjmp _set"
          :build
          echo.
          echo === building diagnostic lua.exe ===
          set "BADC=%CD%\target\release\badc.exe"
          set "WORK=%RUNNER_TEMP%\lua-diag"
          if exist "%WORK%" rmdir /s /q "%WORK%"
          mkdir "%WORK%"
          set "SRC=%CD%\demos\lua\src"
          set "LT=%CD%\demos\lua\tests\ltests"
          "%BADC%" -q -DLUA_USER_H=\"ltests.h\" -I "%SRC%" -I "%LT%" -o "%WORK%\lua.exe" ^
            "%SRC%\lapi.c" "%SRC%\lauxlib.c" "%SRC%\lbaselib.c" "%SRC%\lcode.c" ^
            "%SRC%\lcorolib.c" "%SRC%\lctype.c" "%SRC%\ldblib.c" "%SRC%\ldebug.c" ^
            "%SRC%\ldo.c" "%SRC%\ldump.c" "%SRC%\lfunc.c" "%SRC%\lgc.c" "%SRC%\linit.c" ^
            "%SRC%\liolib.c" "%SRC%\llex.c" "%SRC%\lmathlib.c" "%SRC%\lmem.c" ^
            "%SRC%\loadlib.c" "%SRC%\lobject.c" "%SRC%\lopcodes.c" "%SRC%\loslib.c" ^
            "%SRC%\lparser.c" "%SRC%\lstate.c" "%SRC%\lstring.c" "%SRC%\lstrlib.c" ^
            "%SRC%\ltable.c" "%SRC%\ltablib.c" "%SRC%\ltm.c" "%SRC%\lua.c" ^
            "%SRC%\lundump.c" "%SRC%\lutf8lib.c" "%SRC%\lvm.c" "%SRC%\lzio.c" ^
            "%LT%\ltests.c"
          if errorlevel 1 ( echo lua build failed & exit /b 0 )
          echo.
          echo === sanity: lua -v ===
          "%WORK%\lua.exe" -v
          echo lua-v exit: %ERRORLEVEL%
          echo.
          echo === assertion script under cdb ===
          set "CDBDIR=x64"
          if /I "%PROCESSOR_ARCHITECTURE%"=="ARM64" set "CDBDIR=arm64"
          set "CDB=C:\Program Files (x86)\Windows Kits\10\Debuggers\%CDBDIR%\cdb.exe"
          if not exist "%CDB%" ( echo cdb not found at "%CDB%"; skipping crash capture & exit /b 0 )
          echo print 'before assert' > "%WORK%\probe.lua"
          echo assert(false, 'probe-assertion') >> "%WORK%\probe.lua"
          echo print 'unreachable' >> "%WORK%\probe.lua"
          set "LOG=%RUNNER_TEMP%\lua-cdb.log"
          if exist "%LOG%" del "%LOG%"
          "%CDB%" -logo "%LOG%" -c "g; .lastevent; r; kn 30; lm; qq" -G -g "%WORK%\lua.exe" "%WORK%\probe.lua"
          echo cdb exit: %ERRORLEVEL%
          if exist "%LOG%" ( echo === cdb log === & type "%LOG%" ) else ( echo no cdb log produced )
      - name: probe Windows libc number formatting + frexp/ldexp
        # Reproduces the msvcrt / ucrtbase entry points the
        # windows-lane lua tests fail against:
        # `snprintf("%.14g", 1203.125)` (strings.lua), the
        # `ldexp(frexp(x))` round-trip on math.lua's eight
        # constants, and the adjacent-ULP `tostring(x) !=
        # tostring(x + 2^(i - 52))` chain from math.lua's
        # 1100-1110 block. The output decides whether the
        # remaining bug is in c5's binding choice, the printf /
        # strtod two-step that `tostringbuffFloat` relies on,
        # or the test idiom itself.
        if: runner.os == 'Windows'
        shell: cmd
        continue-on-error: true
        run: |
          @echo off
          setlocal
          set "BADC=%CD%\target\release\badc.exe"
          set "WORK=%RUNNER_TEMP%\probe"
          if exist "%WORK%" rmdir /s /q "%WORK%"
          mkdir "%WORK%"
          > "%WORK%\probe.c" echo #include ^<stdio.h^>
          >>"%WORK%\probe.c" echo #include ^<math.h^>
          >>"%WORK%\probe.c" echo #include ^<stdlib.h^>
          >>"%WORK%\probe.c" echo #include ^<string.h^>
          >>"%WORK%\probe.c" echo int main(void) {
          >>"%WORK%\probe.c" echo   char b[64];
          >>"%WORK%\probe.c" echo   double vs[8] = {0.0, 10.0, 32.0, -3.14159265358979, 1e10, 1e-10, 0.0, 0.0};
          >>"%WORK%\probe.c" echo   double inf_pos = 1.0; inf_pos = inf_pos / 0.0; vs[6] =  inf_pos;
          >>"%WORK%\probe.c" echo   double neg     = 1.0; neg     = -neg / 0.0; vs[7] = neg;
          >>"%WORK%\probe.c" echo   snprintf(b, 64, "%%.14g", 1203.125);    printf("FMT1203: [%%s]\n", b);
          >>"%WORK%\probe.c" echo   snprintf(b, 64, "%%.14g", -0.5);        printf("FMTneg5: [%%s]\n", b);
          >>"%WORK%\probe.c" echo   snprintf(b, 64, "%%.14g", -32767.0);    printf("FMTk32:  [%%s]\n", b);
          >>"%WORK%\probe.c" echo   snprintf(b, 64, "%%g",    1203.125);    printf("FMTg:    [%%s]\n", b);
          >>"%WORK%\probe.c" echo   for (int i = 0; i ^< 8; i++) {
          >>"%WORK%\probe.c" echo     double x = vs[i];
          >>"%WORK%\probe.c" echo     int e;
          >>"%WORK%\probe.c" echo     double m = frexp(x, ^&e);
          >>"%WORK%\probe.c" echo     double r = ldexp(m, e);
          >>"%WORK%\probe.c" echo     printf("RT[%%d] x=%%.17g m=%%.17g e=%%d r=%%.17g eq=%%d\n", i, x, m, e, r, r == x);
          >>"%WORK%\probe.c" echo   }
          >>"%WORK%\probe.c" echo   int first_x_eq_y = 0, first_str_eq = 0;
          >>"%WORK%\probe.c" echo   int x_eq_y_i = 0,    str_eq_i = 0;
          >>"%WORK%\probe.c" echo   for (int outer = 1; outer ^<= 1022; outer++) {
          >>"%WORK%\probe.c" echo     int signs[2]; signs[0] = -outer; signs[1] = outer;
          >>"%WORK%\probe.c" echo     for (int s = 0; s ^< 2; s++) {
          >>"%WORK%\probe.c" echo       int i = signs[s];
          >>"%WORK%\probe.c" echo       double xP = pow(2.0, (double)i);
          >>"%WORK%\probe.c" echo       double dP = pow(2.0, (double)(i - 52));
          >>"%WORK%\probe.c" echo       double yP = xP + dP;
          >>"%WORK%\probe.c" echo       if (!first_x_eq_y ^&^& xP == yP) { first_x_eq_y = 1; x_eq_y_i = i;
          >>"%WORK%\probe.c" echo         printf("XEQY i=%%d xP=%%.17g dP=%%.17g yP=%%.17g\n", i, xP, dP, yP); }
          >>"%WORK%\probe.c" echo       char fxP[64], fyP[64], buf[64];
          >>"%WORK%\probe.c" echo       int len;
          >>"%WORK%\probe.c" echo       len = snprintf(buf, 64, "%%.15g", xP);
          >>"%WORK%\probe.c" echo       if (strtod(buf, NULL) != xP) len = snprintf(buf, 64, "%%.17g", xP);
          >>"%WORK%\probe.c" echo       if (buf[strspn(buf, "-0123456789")] == 0) { buf[len++] = '.'; buf[len++] = '0'; buf[len] = 0; }
          >>"%WORK%\probe.c" echo       strcpy(fxP, buf);
          >>"%WORK%\probe.c" echo       len = snprintf(buf, 64, "%%.15g", yP);
          >>"%WORK%\probe.c" echo       if (strtod(buf, NULL) != yP) len = snprintf(buf, 64, "%%.17g", yP);
          >>"%WORK%\probe.c" echo       if (buf[strspn(buf, "-0123456789")] == 0) { buf[len++] = '.'; buf[len++] = '0'; buf[len] = 0; }
          >>"%WORK%\probe.c" echo       strcpy(fyP, buf);
          >>"%WORK%\probe.c" echo       if (!first_str_eq ^&^& xP != yP ^&^& strcmp(fxP, fyP) == 0) {
          >>"%WORK%\probe.c" echo         first_str_eq = 1; str_eq_i = i;
          >>"%WORK%\probe.c" echo         printf("STREQ i=%%d xP=%%.17g yP=%%.17g fxP=%%s fyP=%%s\n", i, xP, yP, fxP, fyP); }
          >>"%WORK%\probe.c" echo     }
          >>"%WORK%\probe.c" echo   }
          >>"%WORK%\probe.c" echo   printf("WALK_SUMMARY: x_eq_y_first_i=%%d str_eq_first_i=%%d\n", x_eq_y_i, str_eq_i);
          >>"%WORK%\probe.c" echo   return 0;
          >>"%WORK%\probe.c" echo }
          "%BADC%" -o "%WORK%\probe.exe" "%WORK%\probe.c"
          if errorlevel 1 ( echo probe build failed & exit /b 0 )
          "%WORK%\probe.exe"
          echo probe exit: %ERRORLEVEL%
      - name: chibicc bringup smoke
        # chibicc is the substantial multi-TU exerciser for the
        # cross-TU linker. All nine TUs compile on macOS / Linux,
        # the multi-TU link emits a working chibicc binary, and
        # that binary produces byte-identical assembly to a gcc-
        # built reference on the self-host sample suite (see
        # `self_host.py`, gated to Linux x86_64). Windows runners
        # exit 2 (skip): chibicc's body is POSIX-shaped (fork +
        # execvp + waitpid + glob + dirname + strndup +
        # open_memstream + strtold) and the bringup currently
        # targets POSIX hosts only.
        shell: bash
        run: python demos/chibicc/smoke.py || test $? -eq 2
      - name: chibicc self-host parity (Linux x86_64 only)
        # Builds chibicc twice (gcc + badc), compares the .s
        # output on a curated sample suite, and asserts the
        # linked binaries return the same exit code. Skipped
        # automatically on non-Linux-x86_64 runners (chibicc
        # emits SysV x86_64 GAS only).
        shell: bash
        run: python demos/chibicc/self_host.py || test $? -eq 2
      - name: tinycc bringup smoke
        # Vendored tinycc HEAD compiles + multi-TU links across
        # every supported runner: each lane's HOST_MATRIX entry
        # picks the matching target_macros / cpp_defs / TU set.
        run: python demos/tinycc/smoke.py
      - name: tinycc self-host parity
        # Compares `tcc -c` output between a reference tcc built
        # with the host compiler and a stage1 tcc built through
        # badc. HOST_PROFILES in self_host.py picks the per-host
        # TU set plus `TCC_TARGET_*` macros. The Linux lanes
        # (x86_64 + aarch64) gate strictly on the five-stage
        # fixed point (samples / corpus / gen2 == gen3 /
        # gen2-self compile / functional). The macOS aarch64 lane
        # is soft-gated on gen2-self while a c5 miscompile in
        # `tccmacho.c`'s Mach-O binding emit gets resolved. The
        # Windows lanes (x86_64 + ARM64) are in active bringup
        # and run as soft-report only; the harness publishes
        # tallies but does not fail CI yet. KNOWN_DRIFT lists
        # per-host residual mismatches that do not affect
        # correctness.
        shell: bash
        run: python demos/tinycc/self_host.py || test $? -eq 2
      - name: upload tinycc stage1 binary (Windows lanes only)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: tcc-stage1-${{ matrix.os }}
          path: demos/tinycc/.self_host/tcc-stage1*
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 1
      - name: upload tinycc gen2 / gen2-self binaries (Windows lanes only)
        # Both binaries are produced from the same stage1-compiled
        # .o objects; gen2 is host-gcc-linked and works, gen2-self
        # is stage1-linked through tccpe.c and AVs at runtime on
        # Windows arm64. Side-by-side `objdump -p` / `dumpbin
        # /headers` of the two reveals the c5-side link-output
        # structural delta that drives the AV.
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: tcc-gen2-${{ matrix.os }}
          path: |
            demos/tinycc/.self_host/tcc-gen2*
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 1
      - name: probe tcc-stage1 imports vs system DLL exports (Windows lanes only)
        # On windows-11-arm the binary fails to load with
        # STATUS_ENTRYPOINT_NOT_FOUND (0xC0000139). Cross-reference
        # the binary's imports against the actual exports of every
        # DLL it links so the missing symbol surfaces in the log
        # without needing a debugger.
        if: runner.os == 'Windows'
        shell: pwsh
        continue-on-error: true
        run: |
          $stage1 = Get-ChildItem demos/tinycc/.self_host/tcc-stage1* | Select-Object -First 1
          if (-not $stage1) { Write-Host 'no tcc-stage1 present'; exit 0 }
          Write-Host "=== inspecting $($stage1.FullName) ==="
          $arch = $env:PROCESSOR_ARCHITECTURE
          $dumpbin = (Get-ChildItem "C:\Program Files\Microsoft Visual Studio\*\*\VC\Tools\MSVC\*\bin\Host*\*\dumpbin.exe" -ErrorAction SilentlyContinue | Select-Object -First 1)
          if (-not $dumpbin) { Write-Host 'dumpbin not found, skipping'; exit 0 }
          $rawImports = & $dumpbin /imports $stage1.FullName 2>&1 | Out-String
          # Parse `<spaces><hex>  <name>` rows; group by preceding `DLL Name:` line.
          $currentDll = ''
          $importMap = @{}
          foreach ($line in ($rawImports -split "`r?`n")) {
              if ($line -match '^\s+(?<dll>\S+\.dll)$') {
                  $currentDll = $matches['dll'].ToLower()
                  if (-not $importMap.ContainsKey($currentDll)) { $importMap[$currentDll] = New-Object 'System.Collections.Generic.HashSet[string]' }
              }
              elseif ($currentDll -and $line -match '^\s+[0-9A-Fa-f]+\s+(?<sym>[A-Za-z_][A-Za-z0-9_]*)\s*$') {
                  $importMap[$currentDll].Add($matches['sym']) | Out-Null
              }
          }
          foreach ($dll in $importMap.Keys) {
              Write-Host ""
              Write-Host "=== imports from $dll : $($importMap[$dll].Count) symbols ==="
              $dllPath = "C:\Windows\System32\$dll"
              if (-not (Test-Path $dllPath)) { Write-Host "  $dllPath not found, skipping"; continue }
              $rawExports = & $dumpbin /exports $dllPath 2>&1 | Out-String
              $exports = New-Object 'System.Collections.Generic.HashSet[string]'
              foreach ($eline in ($rawExports -split "`r?`n")) {
                  if ($eline -match '^\s+\d+\s+[0-9A-Fa-f]+\s+[0-9A-Fa-f]+\s+(?<sym>[A-Za-z_][A-Za-z0-9_@?$]*)') {
                      $exports.Add($matches['sym']) | Out-Null
                  }
              }
              Write-Host "  $($exports.Count) symbols in $dllPath"
              $missing = @($importMap[$dll]) | Where-Object { -not $exports.Contains($_) }
              if ($missing) {
                  Write-Host "  *** MISSING from $dll ***"
                  $missing | ForEach-Object { Write-Host "    $_" }
              } else {
                  Write-Host "  (all imports resolve)"
              }
          }
      - name: capture stage1 crash under cdb (Windows lanes only)
        # On windows-latest the binary loads cleanly (`-v` returns
        # 0) but every `-c` invocation faults. Run a single sample
        # under cdb with the crash-state dump command so the AV PC
        # + unwind reach the log.
        if: runner.os == 'Windows'
        shell: cmd
        continue-on-error: true
        run: |
          @echo off
          setlocal
          dir demos\tinycc\.self_host\
          rem badc may emit `tcc-stage1` or `tcc-stage1.exe` depending
          rem on the writer; prefer the .exe spelling because cdb's
          rem CreateProcess does not auto-append the extension the way
          rem the Python harness's subprocess.run does.
          set "STAGE1=demos\tinycc\.self_host\tcc-stage1.exe"
          if not exist "%STAGE1%" set "STAGE1=demos\tinycc\.self_host\tcc-stage1"
          if not exist "%STAGE1%" ( echo no tcc-stage1 present & exit /b 0 )
          rem Make a copy with the .exe extension so cdb's CreateProcess
          rem accepts it even when the harness wrote the binary without
          rem the suffix.
          if not exist "%STAGE1%.exe" copy /Y "%STAGE1%" "%STAGE1%.exe" >nul
          if exist "%STAGE1%.exe" set "STAGE1=%STAGE1%.exe"
          set "CDBDIR=x64"
          if /I "%PROCESSOR_ARCHITECTURE%"=="ARM64" set "CDBDIR=arm64"
          set "CDB=C:\Program Files (x86)\Windows Kits\10\Debuggers\%CDBDIR%\cdb.exe"
          if not exist "%CDB%" ( echo cdb not found at "%CDB%" & exit /b 0 )
          echo === cdb at %CDB% ===
          set "SAMPLE=demos\tinycc\.self_host\samples\arithmetic.c"
          if not exist "%SAMPLE%" ( echo sample not present & exit /b 0 )
          set "LOG=%RUNNER_TEMP%\cdb.log"
          if exist "%LOG%" del "%LOG%"
          rem cmd-shell quoting puts the `-c` debugger script in a
          rem single quoted token, then `--` separates from the
          rem inferior + its args. PowerShell's Start-Process
          rem ArgumentList globbed the whole tail into one string
          rem last run; cmd preserves arg boundaries.
          "%CDB%" -logo "%LOG%" -c "g; .lastevent; r; kn 30; lm; qq" -G -g "%STAGE1%" -B demos/tinycc -c "%SAMPLE%" -o "%RUNNER_TEMP%\arith.o"
          echo cdb exit: %ERRORLEVEL%
          if exist "%LOG%" ( echo === cdb log === & type "%LOG%" ) else ( echo no cdb log produced )
      - name: capture gen2-self crash under cdb (Windows lanes only)
        # gen2-self is the stage1-linked tcc binary built from the
        # gen2-compiled tinycc objects -- functionally identical to
        # gen2, except linked by stage1's tccpe-driven PE writer
        # rather than host gcc + mingw ld. On Windows arm64 the
        # gen2-self binary AVs early. Run it under cdb with the
        # same script the stage1 step uses so the AV PC + unwind
        # land in the log.
        if: runner.os == 'Windows'
        shell: cmd
        continue-on-error: true
        run: |
          @echo off
          setlocal
          set "GEN2SELF=demos\tinycc\.self_host\tcc-gen2-self.exe"
          if not exist "%GEN2SELF%" set "GEN2SELF=demos\tinycc\.self_host\tcc-gen2-self"
          if not exist "%GEN2SELF%" ( echo no tcc-gen2-self present & exit /b 0 )
          if not exist "%GEN2SELF%.exe" copy /Y "%GEN2SELF%" "%GEN2SELF%.exe" >nul
          if exist "%GEN2SELF%.exe" set "GEN2SELF=%GEN2SELF%.exe"
          set "CDBDIR=x64"
          if /I "%PROCESSOR_ARCHITECTURE%"=="ARM64" set "CDBDIR=arm64"
          set "CDB=C:\Program Files (x86)\Windows Kits\10\Debuggers\%CDBDIR%\cdb.exe"
          if not exist "%CDB%" ( echo cdb not found at "%CDB%" & exit /b 0 )
          set "SAMPLE=demos\tinycc\.self_host\samples\arithmetic.c"
          if not exist "%SAMPLE%" ( echo sample not present & exit /b 0 )
          set "LOG=%RUNNER_TEMP%\cdb-gen2-self.log"
          if exist "%LOG%" del "%LOG%"
          "%CDB%" -logo "%LOG%" -c "g; .lastevent; r; kn 30; lm; qq" -G -g "%GEN2SELF%" -B demos/tinycc -c "%SAMPLE%" -o "%RUNNER_TEMP%\arith.gen2self.o"
          echo cdb exit: %ERRORLEVEL%
          if exist "%LOG%" ( echo === cdb gen2-self log === & type "%LOG%" ) else ( echo no cdb log produced )
      - name: stb header-only smoke
        # The densest demo: a single TU pulls in six stb_*.h
        # headers (stb_sprintf, stb_perlin, stb_image_write,
        # stb_image, stb_ds, stb_rect_pack) with their
        # `STB_*_IMPLEMENTATION` macros defined, then exercises
        # one scenario per header (sprintf round-trip, Perlin
        # noise range, PNG encode-decode, stretchy-array sums,
        # skyline rect pack). Catches header-only-library
        # idioms: heavy macro use, function-type typedefs,
        # 2D-array params, local arrays with runtime
        # initializers, float arithmetic in static initializers.
        # PSD is skipped via STBI_NO_PSD pending an aarch64
        # codegen-drift regression specific to that decoder.
        run: python demos/stb/smoke.py
      - name: gui_hello build-only smoke
        # Three GUI demos -- Win32, X11, Cocoa via objc_msgSend --
        # cross-compiled to all five supported targets. Build-only
        # because CI runners don't have display servers / Window
        # Stations / XQuartz; a developer runs the produced
        # binary locally to see the actual window.
        run: python demos/gui_hello/smoke.py
      - name: nt_loader / nt_hello smoke
        # Builds both NT-flavoured demos for windows-x64 and
        # windows-arm64 and validates the Subsystem byte (CUI
        # for nt_loader, NATIVE for nt_hello). On the two Windows
        # runners the loader is additionally executed against
        # nt_hello as a codegen canary: the loader can't actually
        # launch a NATIVE image without SeTcbPrivilege, but the
        # smoke asserts it reaches every milestone log line in
        # order and exits 1 with one of the known privilege-gate
        # NTSTATUSes. An AV / truncated output / unexpected
        # NTSTATUS would signal a c5 Windows-codegen regression.
        run: python demos/nt_loader/smoke.py

  features:
    name: feature combos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: features
      # Explicit matrix of feature flags. Each row mirrors a way a real
      # consumer might depend on the crate. If you add a new feature to
      # Cargo.toml, add a row here so an empty / single-feature config
      # can't silently regress.
      - name: default (std)
        run: cargo build --locked --verbose
      - name: --no-default-features --lib
        run: cargo build --locked --no-default-features --lib --verbose
      - name: --all-features
        run: cargo build --locked --all-features --verbose
