name: CI

on:
  pull_request:
  push:
    branches: [master]

# A pushed branch + the PR it opens would otherwise run twice. Cancel
# the older run on every new push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
      # Sources and docs are ASCII-only. Smart quotes / em dashes /
      # arrows tend to sneak in via copy-paste and rendered editor
      # autocorrect; keep them out at the gate.
      - name: ASCII-only sources
        run: |
          if grep -rPn '[^\x00-\x7F]' \
              --include='*.md' --include='*.rs' --include='*.c' \
              --include='*.toml' --include='*.yml' \
              --exclude-dir=target --exclude-dir=.git . ; then
            echo
            echo "::error::Non-ASCII characters found above."
            echo "Common replacements: -> for U+2192, -- for em dash (U+2014), ... for ellipsis (U+2026)."
            exit 1
          fi

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
          - windows-latest
          - windows-11-arm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}
      - name: install wine (linux only)
        # `ubuntu-24.04-arm` -> native_pe_arm64 tests via wine 10's
        # aarch64-windows DLL set.
        # `ubuntu-latest`    -> native_pe_x64 tests via wine's
        # x86_64-windows DLL set, as a cross-check against the
        # `windows-latest` runner: both should accept the same PE,
        # so a divergence flags either a wine bug or a real format
        # issue. Skip on every other runner -- the tests cfg-gate
        # to their respective triples.
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-24.04-arm'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y wine
      - name: prime wine prefix (linux only)
        # First-time `wine` invocation creates `~/.wine`, which on a
        # fresh CI runner takes ~60s and would race the parallel test
        # processes (cargo test runs tests on threads, each shelling
        # out to wine; without a primed prefix they all try to
        # initialize it concurrently and time out). Run wineboot
        # once up front so every test sees a ready prefix.
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-24.04-arm'
        run: wineboot --init
        env:
          WINEDEBUG: -all
      - name: cargo test (default features)
        # Each runner exercises the native-codegen path that targets
        # its own host:
        #  * macos-latest        -> src/c4/tests/native.rs (Mach-O,
        #    `/usr/bin/codesign`) + src/c4/tests/jit.rs (in-process
        #    JIT via MAP_JIT + pthread_jit_write_protect_np). The
        #    PE-via-WINE tests in src/c4/tests/native_pe_x64.rs
        #    compile here too but skip at runtime when WINE isn't
        #    installed (it isn't on the macos-latest image).
        #  * ubuntu-24.04-arm    -> src/c4/tests/native_elf.rs
        #    (Linux/aarch64 ELF, host kernel exec) +
        #    src/c4/tests/jit.rs (mprotect-based JIT) +
        #    src/c4/tests/native_pe_arm64.rs through wine 10's
        #    aarch64-windows DLL set (installed in the step above).
        #  * ubuntu-latest       -> src/c4/tests/native_elf_x64.rs
        #    (Linux/x86_64 ELF, host kernel exec) +
        #    src/c4/tests/jit.rs (mprotect-based JIT) +
        #    src/c4/tests/native_pe_x64.rs through wine's
        #    x86_64-windows DLL set (installed in the step above)
        #    as a cross-check against the windows-latest runner.
        #  * windows-latest      -> src/c4/tests/native_pe_x64.rs
        #    (Windows/x86_64 PE, host kernel exec). Runs the
        #    produced .exe directly; no JIT lane on Windows because
        #    the in-process JIT loader hasn't been ported.
        #  * windows-11-arm      -> src/c4/tests/native_pe_arm64.rs
        #    (Windows/AArch64 PE, host kernel exec). Same shape as
        #    the windows-latest lane but for the AArch64 backend.
        # The backend test modules are cfg-gated to their
        # respective triples, so the other runners compile them out
        # and only verify the VM, lexer, parser, codegen-as-bytecode,
        # and optimizer paths.
        run: cargo test --locked --verbose
      - name: cargo build --no-default-features --lib
        # The no_std variant -- no StdHost adapter, alloc only. Library-
        # only because the binary needs std for argv / stdio.
        run: cargo build --locked --no-default-features --lib --verbose

  features:
    name: feature combos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: features
      # Explicit matrix of feature flags. Each row mirrors a way a real
      # consumer might depend on the crate. If you add a new feature to
      # Cargo.toml, add a row here so an empty / single-feature config
      # can't silently regress.
      - name: default (std)
        run: cargo build --locked --verbose
      - name: --no-default-features --lib
        run: cargo build --locked --no-default-features --lib --verbose
      - name: --all-features
        run: cargo build --locked --all-features --verbose
