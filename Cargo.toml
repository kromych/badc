[package]
name = "c4rs"
version = "0.1.0"
edition = "2024"

[lib]
name = "c4rs"
path = "src/lib.rs"

[[bin]]
name = "c4rs"
path = "src/main.rs"

[features]
default = ["std"]
# Enables the StdHost adapter (file IO, env vars, real stdin/stdout) and
# the std::error::Error impl on C4Error. Without it, the library builds
# under no_std + alloc and callers must supply their own Host impl.
std = []

[dependencies]
