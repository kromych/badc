[package]
name = "badc"
version = "0.0.3"
edition = "2024"

[lib]
name = "badc"
path = "src/lib.rs"

[[bin]]
name = "badc"
path = "src/main.rs"

[features]
default = ["std"]
# Enables the StdHost adapter (file IO, env vars, real stdin/stdout) and
# the std::error::Error impl on C5Error (the c5-dialect error type).
# Without it, the library builds under no_std + alloc and callers must
# supply their own Host impl.
std = []

[dependencies]
