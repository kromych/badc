[package]
name = "badc"
version = "0.1.0"
edition = "2024"

[lib]
name = "badc"
path = "src/lib.rs"

[[bin]]
name = "badc"
path = "src/main.rs"

[features]
default = ["std"]
# Enables the StdHost adapter (file IO, env vars, real stdin/stdout) and
# the std::error::Error impl on C4Error (the c4-dialect error type -- name
# kept to acknowledge the dialect lineage). Without it, the library builds
# under no_std + alloc and callers must supply their own Host impl.
std = []

[dependencies]
